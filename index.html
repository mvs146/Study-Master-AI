<style>
:root{
  --bg:#0F1729;--surface:#161E35;--surface2:#1C2647;--border:#2A3760;--border2:#3A4F80;
  --accent:#4F8EF7;--accent2:#7C5CFC;--green:#10B981;--amber:#F59E0B;--red:#EF4444;
  --text:#E8EEF8;--muted:#7A8AAA;--dim:#3A4F70;
  --card-bg:#1A2240;--pill:#1E2D50;
  --radius:12px;--radius-sm:8px;--radius-lg:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  font-family:'Space Grotesk',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
}
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 60% at 20% -10%,rgba(79,142,247,.12) 0%,transparent 60%),
             radial-gradient(ellipse 60% 50% at 80% 110%,rgba(124,92,252,.10) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}
#app{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:.75rem .75rem env(safe-area-inset-bottom,1rem)}

/* ── Typography ── */
h1,h2,h3{font-family:'Syne',sans-serif;letter-spacing:-.02em}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ── Buttons ── */
button{cursor:pointer;font-family:inherit;border:none;transition:all .15s;touch-action:manipulation;outline:none}
button:active{transform:scale(.97);opacity:.85}
.btn{padding:7px 14px;border-radius:var(--radius-sm);font-size:11px;font-weight:600;border:1.5px solid var(--border);background:var(--surface2);color:var(--text)}
.btn:hover{border-color:var(--border2);background:var(--surface)}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;font-weight:700;box-shadow:0 4px 18px rgba(79,142,247,.3)}
.btn-primary:hover{opacity:.9;box-shadow:0 6px 24px rgba(79,142,247,.4)}
.btn-sm{padding:4px 10px;font-size:10px;border-radius:20px}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--muted)}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}

/* ── Inputs ── */
input,select,textarea{
  font-family:inherit;background:var(--surface);border:1.5px solid var(--border);
  color:var(--text);border-radius:var(--radius-sm);outline:none;
  -webkit-appearance:none;appearance:none;transition:border-color .15s;
}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,142,247,.12)}
input::placeholder,textarea::placeholder{color:var(--dim)}
select{cursor:pointer}
textarea{resize:vertical}

/* ── Cards ── */
.card{background:var(--card-bg);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px}
.card:hover{border-color:var(--border2)}
.surface{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius)}

/* ── Pills / Tags ── */
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;background:var(--pill);color:var(--muted);border:1px solid var(--border)}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);width:min(520px,100%);max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(0,0,0,.6)}
.modal-hdr{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-body{padding:16px 18px;overflow-y:auto;flex:1}

/* ── Toasts ── */
#toasts{position:fixed;top:16px;right:16px;z-index:99999;display:flex;flex-direction:column;gap:6px;max-width:320px;pointer-events:none}
.toast{padding:10px 14px;border-radius:var(--radius-sm);font-size:11px;font-weight:600;border-left:3px solid;animation:slideIn .2s ease;backdrop-filter:blur(10px);pointer-events:auto}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* ── Flip Cards ── */
.fcgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.fc{cursor:pointer;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--card-bg);padding:12px;min-height:120px;display:flex;flex-direction:column;transition:border-color .2s,background .2s}
.fc:hover{border-color:var(--border2)}
.fc.flipped{background:var(--surface2);border-color:var(--accent)}
.fc.known{border-color:var(--green)!important;background:rgba(16,185,129,.06)!important}

/* ── Quiz options ── */
.qopt{cursor:pointer;padding:9px 12px;border-radius:var(--radius-sm);font-size:12px;border:1.5px solid var(--border);background:var(--surface);display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;transition:all .15s;color:var(--text)}
.qopt:hover{border-color:var(--border2);background:var(--surface2)}
.qopt.sel{border-color:var(--accent);background:rgba(79,142,247,.08);color:var(--accent)}
.qopt.right{border-color:var(--green)!important;background:rgba(16,185,129,.08)!important;color:var(--green)!important}
.qopt.wrong{border-color:var(--red)!important;background:rgba(239,68,68,.08)!important;color:var(--red)!important}

/* ── Sections ── */
.sec{border:1.5px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:7px}
.sec-hdr{padding:10px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:var(--surface);transition:background .15s}
.sec-hdr:hover{background:var(--surface2)}
.sec-hdr p{margin:0;font-weight:700;font-size:12px;color:var(--accent)}
.sec-body{padding:12px 14px;background:var(--card-bg)}

/* ── Grid cols ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.gfit{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:7px}

/* ── Header bar ── */
.topbar{display:flex;align-items:center;gap:10px;padding:12px 0 10px;margin-bottom:10px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.logo-text h1{font-size:18px;color:var(--text);font-family:'Syne',sans-serif;font-weight:800;white-space:nowrap}
.logo-text p{font-size:9px;color:var(--muted);font-weight:500;margin-top:1px}
.topbar-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}

/* ── Mode grid ── */
.modegrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.mode-btn{padding:9px 6px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface);display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:all .15s}
.mode-btn:hover{border-color:var(--border2);background:var(--surface2)}
.mode-btn.active{border-color:var(--accent);background:rgba(79,142,247,.1)}
.mode-btn.locked{opacity:.5}
.mode-btn span.ic{font-size:18px}
.mode-btn span.lbl{font-size:9px;font-weight:700;text-align:center;color:var(--muted)}
.mode-btn.active span.lbl{color:var(--accent)}

/* ── Animations ── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
.fade-in{animation:fadeUp .3s ease forwards}
.spin{animation:spin 1s linear infinite}

/* ── Divider ── */
.divider{height:1px;background:var(--border);margin:10px 0}

/* ── Exam mode dark ── */
.emblock{background:linear-gradient(135deg,var(--surface),#1a1040);border:1.5px solid rgba(124,92,252,.25);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px}

/* ── Progress bar ── */
.pbar{height:4px;background:var(--dim);border-radius:4px;overflow:hidden}
.pbar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width .3s}

/* ── Result wrapper ── */
.result-wrap{border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:14px;background:var(--card-bg);animation:fadeUp .3s ease}

/* ── Responsive ── */
@media(max-width:600px){
  .modegrid{grid-template-columns:repeat(3,1fr)!important}
  .g4{grid-template-columns:repeat(2,1fr)}
  .g3{grid-template-columns:repeat(2,1fr)}
  .topbar-actions .hidelabel{display:none}
  .fcgrid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:380px){
  .modegrid{grid-template-columns:repeat(2,1fr)!important}
}

/* ── Tutor chat ── */
.chat-bubble{max-width:88%;padding:9px 13px;border-radius:var(--radius-sm);font-size:12px;line-height:1.65;margin-bottom:7px}
.chat-ai{background:var(--surface2);color:var(--text);border-bottom-left-radius:3px;align-self:flex-start;border:1px solid var(--border)}
.chat-user{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-bottom-right-radius:3px;align-self:flex-end}
.chat-area{display:flex;flex-direction:column;max-height:320px;overflow-y:auto;gap:3px;padding:10px}

/* ── Sub-dropdown ── */
.subdrop{position:absolute;top:calc(100% + 5px);left:0;background:var(--surface);border:2px solid var(--accent);border-radius:var(--radius);padding:10px;width:310px;max-height:380px;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,.5);z-index:9999}
.subdrop-group p{margin:0 0 5px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;padding-bottom:4px;border-bottom:1px solid var(--dim)}
.subdrop-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-bottom:9px}
.sub-item{padding:5px 7px;border-radius:6px;border:1.5px solid var(--border);background:var(--surface2);font-size:9.5px;color:var(--text);text-align:left;display:flex;align-items:center;gap:4px;font-weight:500}
.sub-item.active{background:rgba(79,142,247,.12);border-color:var(--accent);color:var(--accent)}
.sub-item:hover{border-color:var(--border2)}

/* ── Saved notes ── */
.saved-item{padding:10px 13px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface);margin-bottom:6px;cursor:pointer;transition:border-color .15s}
.saved-item:hover{border-color:var(--accent)}

/* ── Banner ── */
.offline-banner{position:fixed;top:0;left:0;right:0;z-index:99999;background:var(--red);color:#fff;text-align:center;padding:7px 16px;font-size:11px;font-weight:700}
</style>

<script>
'use strict';

// ── Local Storage helper ──────────────────────────────────
const LS={
  g:(k,d=null)=>{try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d}catch{return d}},
  s:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
};

// ── Anthropic API ─────────────────────────────────────────
const API={
  hasKey:()=>true,
  call:async(body)=>{
    const mapped={...body,model:'claude-sonnet-4-20250514',max_tokens:body.max_tokens||2000};
    const ac=new AbortController();
    const tid=setTimeout(()=>ac.abort(),45000);
    try{
      const r=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify(mapped),signal:ac.signal
      });
      clearTimeout(tid);
      const d=await r.json();
      if(!r.ok||d.error)throw Object.assign(new Error((d.error?.message)||'Error '+r.status),{status:r.status});
      return d;
    }catch(e){clearTimeout(tid);throw e;}
  }
};

// ── JSON fixer ────────────────────────────────────────────
function fixJSON(raw){
  let s=raw.trim();
  s=s.replace(/^```(?:json)?\s*/i,'').replace(/```\s*$/,'').trim();
  const i=s.indexOf('{'),j=s.lastIndexOf('}');
  if(i>-1&&j>i)s=s.slice(i,j+1);
  try{return JSON.parse(s)}catch{
    s=s.replace(/,\s*([}\]])/g,'$1').replace(/([{,]\s*)(\w+)\s*:/g,'$1"$2":').replace(/:\s*'([^']*)'/g,':"$1"');
    return JSON.parse(s);
  }
}

// ── Toast ─────────────────────────────────────────────────
function toast(msg,type='success',ms=3200){
  const b=document.getElementById('toasts');if(!b)return;
  const t=document.createElement('div');
  const col={success:'var(--green)',error:'var(--red)',info:'var(--accent)',warning:'var(--amber)'};
  t.className='toast';
  t.style.cssText=`background:var(--surface2);border-left-color:${col[type]||col.info};color:var(--text)`;
  t.textContent=msg;b.appendChild(t);setTimeout(()=>t.remove(),ms);
}

// ── API error ─────────────────────────────────────────────
function apiErr(e){
  const m=e?.message||'';const st=e?.status;
  if(st===401)return '⚠️ API auth error. Please check configuration.';
  if(st===429||m.includes('429')||m.includes('rate'))return '⏱️ Rate limit hit — wait 30 seconds and retry.';
  if(m.includes('fetch')||m.includes('network')||m.includes('abort'))return '🌐 Network error — check internet and retry.';
  if(st===500)return '🔴 Server error — retry in a moment.';
  return m||'Unknown error — please retry.';
}

// ── Security ──────────────────────────────────────────────
const Sec={
  clean:s=>String(s||'').replace(/<[^>]*>/g,'').replace(/javascript:/gi,'').slice(0,4000).trim(),
  safe:s=>![/<script/i,/javascript:/i,/union\s+select/i,/drop\s+table/i].some(p=>p.test(s)),
  _h:{},rate:(k,max=30)=>{const n=Date.now();Sec._h[k]=(Sec._h[k]||[]).filter(t=>n-t<60000);Sec._h[k].push(n);return Sec._h[k].length<=max}
};

// ── Plans ─────────────────────────────────────────────────
const PLANS={
  free:{id:'free',name:'Free',limit:5,features:['5 AI requests/day','Notes · Quiz · Flashcards','3 subjects']},
  student:{id:'student',name:'Student Pro',price:199,limit:9999,features:['Unlimited AI','All modes','All 40+ subjects','AI Tutor','File Scanner']},
  exam:{id:'exam',name:'Exam Prep',price:499,limit:9999,features:['Everything in Pro','UPSC/NEET/JEE simulator','Exam MCQs','Analytics']}
};
const PR={free:0,student:1,exam:2};
const canUse=(p,m)=>(PR[p]||0)>=(PR[m]||0);

// ── Referral codes ────────────────────────────────────────
const CODES={
  MVS2025:{plan:'student',days:30,label:'30 days Student Pro'},
  MUPPURI100:{plan:'student',days:90,label:'3 months Student Pro'},
  CHAMBER100:{plan:'student',days:0,label:'♾️ Lifetime Pro'},
  UPSC2025:{plan:'exam',days:30,label:'30 days Exam Prep'},
  NEET2025:{plan:'exam',days:30,label:'30 days Exam Prep'},
  JEE2025:{plan:'exam',days:30,label:'30 days Exam Prep'},
  APPSC2025:{plan:'exam',days:30,label:'30 days Exam Prep'},
  TSPSC2025:{plan:'exam',days:30,label:'30 days Exam Prep'},
  TELUGU2025:{plan:'student',days:60,label:'2 months Student Pro'},
  MVSTESTER:{plan:'exam',days:0,label:'♾️ Owner — Lifetime Exam Prep'},
  CHAMBER499:{plan:'exam',days:0,label:'♾️ Admin — Lifetime Exam Prep'},
  DEMO2025:{plan:'student',days:7,label:'7-day trial'},
  TRIAL499:{plan:'exam',days:7,label:'7-day Exam Prep trial'},
};

function applyCode(raw){
  const code=(raw||'').trim().toUpperCase(),e=CODES[code];
  if(!e)return{ok:false,msg:'❌ Invalid code.'};
  const used=LS.g('used_codes',[]);
  if(used.includes(code))return{ok:false,msg:'⚠️ Code already used.'};
  LS.s('user_plan',e.plan);LS.s('used_codes',[...used,code]);
  if(e.days>0)LS.s('ref_exp',Date.now()+e.days*86400000);
  LS.s('ai_count',0);
  return{ok:true,plan:e.plan,label:e.label,msg:'✅ '+e.label+' activated!'};
}

function checkExp(){
  const e=LS.g('ref_exp',null);
  if(e&&Date.now()>e){LS.s('user_plan','free');LS.s('ref_exp',null)}
}

// ── Subjects ──────────────────────────────────────────────
const SGROUPS=[
  {g:'🏛️ UPSC / Civil Services',c:'#D97706',items:[
    {id:'polity',l:'🏛️ Indian Polity',c:'#D97706',free:0},{id:'history_india',l:'🏺 Indian History',c:'#B45309',free:0},

  {g:'🌿 APPSC — Andhra Pradesh',c:'#059669',items:[
    {id:'ap_history',l:'🏺 AP History',c:'#B45309',free:0},{id:'ap_geo',l:'🗺️ AP Geography',c:'#16A34A',free:0},
    {id:'ap_economy',l:'📈 AP Economy',c:'#0D9488',free:0},{id:'ap_polity',l:'🏛️ AP Polity',c:'#D97706',free:0},
    {id:'polavaram',l:'💧 Polavaram Project',c:'#0891B2',free:0},{id:'ysr_schemes',l:'🌾 YSR Schemes',c:'#059669',free:0},
    {id:'ap_current',l:'📰 AP Current Affairs',c:'#DC2626',free:0},{id:'appsc_group1',l:'📋 APPSC Group I',c:'#059669',free:0},
    {id:'appsc_group2',l:'📋 APPSC Group II',c:'#16A34A',free:0},
  ]},
  {g:'🌺 TSPSC — Telangana',c:'#7C3AED',items:[
    {id:'ts_history',l:'🏺 TS History',c:'#7C3AED',free:0},{id:'ts_geo',l:'🗺️ TS Geography',c:'#5B21B6',free:0},
    {id:'ts_economy',l:'📈 TS Economy',c:'#0D9488',free:0},{id:'ts_polity',l:'🏛️ TS Polity',c:'#D97706',free:0},
    {id:'kaleshwaram',l:'💧 Kaleshwaram',c:'#0891B2',free:0},{id:'rythu_bandhu',l:'🌾 Rythu Bandhu',c:'#059669',free:0},
    {id:'ts_current',l:'📰 TS Current Affairs',c:'#DC2626',free:0},{id:'tspsc_group1',l:'📋 TSPSC Group I',c:'#7C3AED',free:0},
  ]},

// ── DOM helpers ───────────────────────────────────────────
function el(tag,props={},kids=[]){
  const e=document.createElement(tag);
  Object.entries(props).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k==='html')e.innerHTML=v;
    else if(k==='class')e.className=v;
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(v!=null)e.setAttribute(k,v);
  });
  [kids].flat(9).forEach(c=>{if(c==null)return;if(c instanceof Element)e.appendChild(c);else e.appendChild(document.createTextNode(String(c)))});
  return e;
}

// ── Generate ──────────────────────────────────────────────
async function generate(){
  const content=APP.inputMode==='paste'?APP.paste:APP.topic;
  if(!content.trim()){toast('Please enter a topic first','warning');return}
  if(!Sec.safe(content)){APP.error='⚠️ Input contains unsafe content';render();return}
  const planObj=PLANS[APP.plan]||PLANS.free;
  if(APP.plan==='free'&&APP.aiCount>=planObj.limit){
    APP.upgradeFor={reason:`Used all ${planObj.limit} free AI requests today. Upgrade for unlimited!`,plan:'student'};render();return;
  }
  const modeObj=MODES.find(m=>m.id===APP.mode);
  if(modeObj&&!canUse(APP.plan,modeObj.min)){APP.upgradeFor={reason:modeObj.l+' requires Student Pro.',plan:'student'};render();return}
  const subj=ALLSUBJ.find(s=>s.id===APP.subject);
  if(subj&&!subj.free&&APP.plan==='free'){APP.upgradeFor={reason:subj.l+' requires Student Pro.',plan:'student'};render();return}
  if(!Sec.rate('gen',60)){APP.error='⚠️ Too many requests. Wait 1 minute.';render();return}
  if(!navigator.onLine){toast('📡 No internet!','error',4000);return}
  APP.loading=true;APP.error=null;APP.result=null;APP.tutorMsgs=[];
  APP.cardFlipped={};APP.quizAns={};APP.quizDone=false;
  if(window.speechSynthesis)window.speechSynthesis.cancel();
  render();
  const lt=setInterval(()=>{APP.loadIdx=(APP.loadIdx+1)%LOADS.length;const el=document.getElementById('load-msg');if(el)el.textContent=LOADS[APP.loadIdx]},1800);
  const cleanTopic=Sec.clean(content);
  const s=ALLSUBJ.find(x=>x.id===APP.subject);
  const prompt=buildPrompt(s?.l||APP.subject,APP.mode,cleanTopic,APP.lang,APP.inputMode==='paste'?APP.paste:null,APP.diff,null);
  try{
    const isNonEng=APP.lang!=='English';
    const sys=isNonEng
      ?`You are a multilingual AI study assistant. Write ALL content in ${APP.lang}. JSON keys stay in English. Return ONLY valid JSON. No markdown. No backticks.`
      :`You are an expert Indian exam tutor. Return ONLY valid JSON. No markdown. No backticks.`;
    const needsMore=['allpack','notes','essay','predict'].includes(APP.mode);
    const maxTok=needsMore?5000:3500;
    const d=await API.call({model:'claude-sonnet-4-20250514',max_tokens:maxTok,system:sys,messages:[{role:'user',content:prompt}]});
    const txt=d.content?.find(b=>b.type==='text')?.text||'';
    if(!txt.trim())throw new Error('Empty response — please retry');
    const parsedData=fixJSON(txt);
    APP.result={mode:APP.mode,data:parsedData,topic:cleanTopic,subject:APP.subject};
    if(APP.plan==='free'){APP.aiCount++;LS.s('ai_count',APP.aiCount)}
  }catch(e){
    APP.error=apiErr(e);
  }
  clearInterval(lt);APP.loading=false;APP.loadIdx=0;render();
  if(APP.result){setTimeout(()=>{const r=document.getElementById('result-anchor');if(r)r.scrollIntoView({behavior:'smooth',block:'start'})},250)}
}

      const res=div({style:{background:pct>=70?'rgba(16,185,129,.08)':'rgba(245,158,11,.08)',border:`2px solid ${pct>=70?'rgba(16,185,129,.3)':'rgba(245,158,11,.3)'}`,borderRadius:'var(--radius)',padding:14,marginBottom:12,textAlign:'center'}});

      qi.appendChild(pts);qTop.appendChild(qi);qDiv.appendChild(qTop);

  const sb=btn({class:'btn btn-primary',style:{padding:'8px 14px',fontSize:11,borderRadius:'var(--radius-sm)'},onclick:async()=>await askTutor(ti)},'Ask →');
  inputRow.appendChild(ti);inputRow.appendChild(sb);w.appendChild(inputRow);

async function askTutor(ti){
  const q=(ti.value||'').trim();if(!q||APP.tutorBusy)return;
  if(APP.plan==='free'&&APP.aiCount>=PLANS.free.limit){APP.upgradeFor={reason:'Tutor requires more AI requests. Upgrade!',plan:'student'};render();return}
  APP.tutorMsgs.push({role:'user',content:q});ti.value='';APP.tutorBusy=true;render();
  const ctx=APP.result?.data?.overview||APP.result?.data?.oneLiner||'';
  const sys=`You are a helpful study tutor. The student is studying: "${APP.topic}". Context: ${ctx}. Answer concisely in 2-3 sentences. ${APP.lang!=='English'?'Reply in '+APP.lang:''}`;
  try{
    const d=await API.call({model:'claude-sonnet-4-20250514',max_tokens:400,system:sys,messages:APP.tutorMsgs.map(m=>({role:m.role,content:m.content}))});
    const reply=d.content?.find(b=>b.type==='text')?.text||'Sorry, I could not get a response.';
    APP.tutorMsgs.push({role:'assistant',content:reply});
    if(APP.plan==='free'){APP.aiCount++;LS.s('ai_count',APP.aiCount)}
  }catch(e){APP.tutorMsgs.push({role:'assistant',content:'❌ '+apiErr(e)})}
  APP.tutorBusy=false;render();
}

// ── AI Scanner ────────────────────────────────────────────
function renderScanner(){
  const w=div({class:'card',style:{marginTop:10}});

  hdr.appendChild(span({style:{fontSize:18}},'📸'));

  hdr.appendChild(ht);
  hdr.appendChild(btn({class:'btn btn-sm btn-ghost',onclick:()=>{APP.showScanner=false;render()}},'✕'));
  w.appendChild(hdr);
  const bd=div({});
  const mRow=div({style:{display:'flex',gap:4,marginBottom:10,flexWrap:'wrap'}});
  [['summary','📋 Notes'],['quiz','✅ MCQ'],['flashcards','🃏 Cards'],['mindmap','🗺️ Mind Map']].forEach(([v,l])=>{
    const b=btn({class:'btn btn-sm',style:{background:APP.scanMode===v?'var(--accent)':'var(--surface2)',color:APP.scanMode===v?'#fff':'var(--muted)',borderColor:APP.scanMode===v?'var(--accent)':'var(--border)'},onclick:()=>{APP.scanMode=v;const el=document.querySelector('#scanner-mode');if(el)el.value=v}},l);
    b.onclick=()=>{APP.scanMode=v;render()};
    mRow.appendChild(b);
  });
  bd.appendChild(mRow);
  const ua=div({style:{border:'2px dashed var(--border)',borderRadius:'var(--radius)',padding:20,textAlign:'center',cursor:'pointer',marginBottom:10,transition:'border-color .2s',background:'var(--surface2)'}});
  const fi=inp({type:'file',style:{display:'none'},accept:'image/*,.pdf,.txt,.csv'});
  ua.innerHTML='<div style="font-size:32px;margin-bottom:8px">📁</div><p style="margin:0 0 4px;font-size:12px;font-weight:600;color:var(--text)">Tap to upload file</p><p style="margin:0;font-size:10px;color:var(--muted)">Images · PDFs · Text files · Question papers</p>';
  ua.onclick=()=>fi.click();
  ua.ondragover=e=>{e.preventDefault();ua.style.borderColor='var(--accent)'};
  ua.ondragleave=()=>{ua.style.borderColor='var(--border)'};
  ua.ondrop=e=>{e.preventDefault();ua.style.borderColor='var(--border)';if(e.dataTransfer.files[0])processFile(e.dataTransfer.files[0])};
  bd.appendChild(ua);bd.appendChild(fi);
  if(APP.scanImg){
    const prev=div({style:{marginBottom:10}});
    const img=document.createElement('img');img.src='data:'+APP.scanMime+';base64,'+APP.scanImg;img.style.cssText='max-width:100%;border-radius:var(--radius-sm);border:1px solid var(--border);max-height:200px;object-fit:contain';
    prev.appendChild(img);bd.appendChild(prev);
  }
  const ta=el('textarea',{style:{width:'100%',padding:'9px 12px',borderRadius:'var(--radius-sm)',fontSize:12,minHeight:80,marginBottom:10,background:'var(--surface)',border:'1.5px solid var(--border)',color:'var(--text)',display:'block',boxSizing:'border-box'},placeholder:'Or paste notes, questions, text here...'});
  ta.value=APP.scanText||'';ta.oninput=()=>{APP.scanText=ta.value};
  bd.appendChild(ta);
  const ab=btn({class:'btn btn-primary',style:{width:'100%',padding:11,fontSize:13,borderRadius:'var(--radius-sm)',marginBottom:8},onclick:()=>analyze()},'🚀 Analyze with AI');
  bd.appendChild(ab);
  bd.appendChild(p({style:{margin:0,fontSize:9,color:'var(--dim)',textAlign:'center'}},'Works with: Math problems · Science diagrams · Handwritten notes · Question papers'));
  w.appendChild(bd);

  fi.onchange=e=>{const f=e.target.files[0];if(f)processFile(f)};

  function processFile(f){
    if(f.type.startsWith('image/')){
      const r=new FileReader();
      r.onload=ev=>{APP.scanImg=ev.target.result.split(',')[1];APP.scanMime=f.type;render();toast('📸 Image loaded!','success')};
      r.readAsDataURL(f);
    }else if(f.type==='text/plain'){
      const r=new FileReader();r.onload=ev=>{APP.scanText=ev.target.result.slice(0,5000);render();toast('📄 File loaded!','success')};
      r.readAsText(f);
    }else{toast('⚠️ Please use image, PDF, or text files','warning')}
  }

  async function analyze(){
    const hasImg=!!APP.scanImg,txt=(APP.scanText||ta.value).trim();
    if(!hasImg&&!txt){toast('Please upload a file or paste text first','warning');return}
    const mode=APP.scanMode||'summary';
    const sc={summary:`{"title":"str","subject":"auto-detect","overview":"str","keyFacts":["f1","f2","f3","f4","f5"],"sections":[{"heading":"str","content":"str","keyPoints":["p1","p2","p3"],"examTip":"str"}],"predictedQuestions":["q1","q2","q3"]}`,quiz:`{"title":"str","questions":[{"id":1,"question":"str","options":["A. opt","B. opt","C. opt","D. opt"],"correct":"A","explanation":"str","difficulty":"easy|medium|hard"}]}`,flashcards:`{"title":"str","cards":[{"id":1,"question":"str","answer":"str","hint":"str","difficulty":"easy|medium|hard","category":"str"}]}`,mindmap:`{"title":"str","summary":"str","branches":[{"id":"b1","name":"str","color":"blue","icon":"emoji","description":"str","children":[{"name":"str","detail":"str"}]}]}`};
    const sys=`Expert AI tutor. For math: solve step by step. For diagrams: explain components. For text: extract key points. Return ONLY valid JSON. No markdown.`;
    ab.disabled=true;ab.textContent='🔍 Analyzing...';
    try{
      let msgs;
      if(hasImg)msgs=[{role:'user',content:[{type:'image',source:{type:'base64',media_type:APP.scanMime,data:APP.scanImg}},{type:'text',text:`Analyze this image carefully. Create study materials (mode: ${mode}). ${txt?'Additional context: '+txt:''} Return: ${sc[mode]}`}]}];
      else msgs=[{role:'user',content:`Create study materials (mode: ${mode}) for this content:\n---\n${txt.slice(0,3000)}\n---\nReturn: ${sc[mode]}`}];
      const d=await API.call({model:'claude-sonnet-4-20250514',max_tokens:4000,system:sys,messages:msgs});
      const raw=d.content?.find(b=>b.type==='text')?.text||'';
      let parsed;try{parsed=fixJSON(raw)}catch{parsed={title:'Analysis Result',overview:raw.slice(0,300),keyFacts:[],sections:[{heading:'Content',content:raw.slice(0,500),keyPoints:[],examTip:'Review carefully'}],predictedQuestions:[]}}
      const outMode=mode==='summary'?'notes':mode;
      APP.result={mode:outMode,data:parsed,topic:parsed.title||'Scanned Content',subject:'uploaded'};
      APP.showScanner=false;render();toast('✅ Analysis complete!','success');
    }catch(e){toast('❌ '+apiErr(e),'error',5000)}
    ab.disabled=false;ab.textContent='🚀 Analyze with AI';
  }
  return w;
}

// ── Progress Modal ────────────────────────────────────────
function renderProgress(){
  const bg=div({class:'modal-bg',onclick:e=>{if(e.target===bg){APP.showProgress=false;render()}}});
  const m=div({class:'modal'});
  const hdr=div({class:'modal-hdr'});
  hdr.appendChild(div({html:'<p style="margin:0;font-weight:800;font-size:14px;color:var(--text)">📊 Your Progress</p>'}));
  hdr.appendChild(btn({class:'btn btn-sm btn-ghost',onclick:()=>{APP.showProgress=false;render()}},'✕'));
  m.appendChild(hdr);
  const bd=div({class:'modal-body'});
  const prog=LS.g('progress',{subjects:{},quizzes:[],streak:0});
  const subjects=Object.entries(prog.subjects||{});
  const quizzes=prog.quizzes||[];
  const avgScore=quizzes.length?Math.round(quizzes.reduce((a,q)=>a+(q.pct||0),0)/quizzes.length):0;
  const stats=[
    {icon:'🔥',label:'Study Streak',value:(prog.streak||0)+' days',col:'var(--amber)'},
    {icon:'📚',label:'Sessions',value:(subjects.reduce((a,[,v])=>a+(v.sessions||0),0))+' total',col:'var(--accent)'},
    {icon:'📝',label:'Quizzes Taken',value:quizzes.length+' quizzes',col:'var(--accent2)'},
    {icon:'🎯',label:'Avg Quiz Score',value:avgScore+'%',col:'var(--green)'},
  ];
  const sg=div({class:'g2',style:{marginBottom:14}});
  stats.forEach(s=>{const sc=div({class:'card',style:{textAlign:'center',background:'var(--surface2)',padding:'12px 10px'}});sc.appendChild(p({style:{margin:'0 0 3px',fontSize:20}},s.icon));sc.appendChild(p({style:{margin:'0 0 2px',fontFamily:'Syne',fontWeight:800,fontSize:16,color:s.col}},s.value));sc.appendChild(p({style:{margin:0,fontSize:10,color:'var(--muted)'}},s.label));sg.appendChild(sc)});
  bd.appendChild(sg);
  if(subjects.length){
    bd.appendChild(p({style:{margin:'0 0 7px',fontWeight:700,fontSize:11,color:'var(--text)'}},'Subjects Studied'));
    subjects.slice(0,8).forEach(([subj,data])=>{
      const sr=div({style:{padding:'8px 10px',borderRadius:'var(--radius-sm)',background:'var(--surface2)',marginBottom:5,display:'flex',justifyContent:'space-between',alignItems:'center'}});
      sr.appendChild(span({style:{fontSize:11,color:'var(--text)'}},subj));
      const rv=div({style:{display:'flex',gap:7,alignItems:'center'}});
      rv.appendChild(span({style:{fontSize:10,color:'var(--muted)'}},data.sessions+' sessions'));
      if(data.avgScore)rv.appendChild(span({style:{fontSize:10,color:'var(--green)',fontWeight:700}},data.avgScore+'%'));
      sr.appendChild(rv);bd.appendChild(sr);
    });
  }
  if(!subjects.length&&!quizzes.length)bd.appendChild(div({style:{textAlign:'center',padding:20,color:'var(--muted)',fontSize:12}},'📭 No activity yet. Start studying!'));
  m.appendChild(bd);bg.appendChild(m);return bg;
}

// ── Save Progress helper ──────────────────────────────────
function saveProgressData(subId,score,total,pct){
  const prog=LS.g('progress',{subjects:{},quizzes:[],streak:0,lastStudy:null});
  const today=new Date().toDateString();
  const streak=prog.lastStudy===today?prog.streak:(prog.lastStudy===new Date(Date.now()-86400000).toDateString()?prog.streak+1:1);
  const subjects={...prog.subjects};
  const sk=(ALLSUBJ.find(s=>s.id===subId)||{l:subId}).l;
  if(!subjects[sk])subjects[sk]={sessions:0,avgScore:0};
  subjects[sk].sessions=(subjects[sk].sessions||0)+1;
  if(pct!=null)subjects[sk].avgScore=Math.round(((subjects[sk].avgScore||0)+pct)/2);
  const quizzes=pct!=null?[...prog.quizzes,{topic:APP.topic,subject:sk,pct,date:Date.now()}].slice(-50):prog.quizzes;
  LS.s('progress',{subjects,quizzes,streak,lastStudy:today});
}

// ── Online/Offline banners ────────────────────────────────
window.addEventListener('online',()=>{const b=document.getElementById('_offbanner');if(b)b.remove();toast('✅ Back online — AI ready!','success',3000)});
window.addEventListener('offline',()=>{if(document.getElementById('_offbanner'))return;const b=document.createElement('div');b.id='_offbanner';b.className='offline-banner';b.textContent='📡 No internet — AI features paused until reconnected';document.body.prepend(b)});

// ── Service Worker ────────────────────────────────────────
if('serviceWorker' in navigator&&location.protocol!=='file:'){
  const swCode=`
const CACHE='studymaster-v1';
self.addEventListener('install',e=>e.waitUntil(self.skipWaiting()));
self.addEventListener('activate',e=>e.waitUntil(self.clients.claim()));
self.addEventListener('fetch',e=>{
  if(e.request.method!=='GET')return;
  if(e.request.url.includes('api.anthropic.com'))return;
  e.respondWith(caches.match(e.request).then(cached=>{
    const net=fetch(e.request).then(resp=>{
      if(resp&&resp.status===200){const cl=resp.clone();caches.open(CACHE).then(c=>c.put(e.request,cl));}
      return resp;
    }).catch(()=>cached);
    return cached||net;
  }));
});`;
  try{const blob=new Blob([swCode],{type:'application/javascript'});navigator.serviceWorker.register(URL.createObjectURL(blob))}catch{}
}

// ── Boot ──────────────────────────────────────────────────
try{
  initApp();
  render();
}catch(e){
  console.error('Boot error:',e);
  document.getElementById('app').innerHTML='<div style="padding:24px;font-family:system-ui;max-width:500px;margin:0 auto"><div style="background:rgba(239,68,68,.1);border:2px solid rgba(239,68,68,.3);border-radius:12px;padding:20px;text-align:center"><h2 style="color:#EF4444;margin-bottom:8px">⚠️ Loading Error</h2><p style="color:#E8EEF8;font-size:13px;line-height:1.6;margin-bottom:12px">'+e.message+'</p><button onclick="location.reload()" style="padding:9px 22px;background:linear-gradient(135deg,#4F8EF7,#7C5CFC);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">🔄 Refresh</button></div></div>';
}
</script>
</body>
</html>
