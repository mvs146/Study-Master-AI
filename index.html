<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,viewport-fit=cover"/>
<meta name="theme-color" content="#0F172A"/>
<title>StudyMaster AI — Muppuri Chamber</title>
<meta name="description" content="India's #1 AI Study Platform. UPSC · NEET · JEE · APPSC · TSPSC · SSC · 40+ Subjects · 50+ Languages"/>
<meta name="application-name" content="StudyMaster AI"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="StudyMaster AI"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════════
   DESIGN SYSTEM — StudyMaster AI v6
   Theme: Deep Navy + Electric Blue + Gold accents
   Font: Plus Jakarta Sans (body) + Space Mono (code/labels)
═══════════════════════════════════════════════════ */
:root{
  --navy:#0F172A;
  --navy2:#1E293B;
  --navy3:#334155;
  --blue:#3B82F6;
  --blue2:#2563EB;
  --blue3:#1D4ED8;
  --gold:#F59E0B;
  --gold2:#D97706;
  --purple:#8B5CF6;
  --green:#10B981;
  --red:#EF4444;
  --cyan:#06B6D4;
  --text:#F1F5F9;
  --text2:#CBD5E1;
  --text3:#94A3B8;
  --border:#1E293B;
  --border2:#334155;
  --card:#131E2D;
  --card2:#1A2540;
  --surface:#0D1623;
  --radius:12px;
  --radius2:8px;
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --glow:0 0 20px rgba(59,130,246,.25);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--surface);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-overflow-scrolling:touch}
input,select,textarea,button{font-family:inherit;font-size:inherit}
button{cursor:pointer;border:none;background:none}
input,select,textarea{outline:none;-webkit-appearance:none;appearance:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--navy3);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--blue)}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes slideInL{from{transform:translateX(-100%)}to{transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(59,130,246,.3)}50%{box-shadow:0 0 22px rgba(59,130,246,.7)}}
@keyframes dot{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:1}}
@keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

/* ── Layout ── */
#app{max-width:900px;margin:0 auto;padding:0 12px 100px}
.gap{height:10px}

/* ── Header ── */
#hdr{position:sticky;top:0;z-index:100;background:rgba(13,22,35,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:0 16px}
.hdr-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;gap:10px;height:54px}
.logo{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--navy2),var(--blue3));border:2px solid rgba(245,158,11,.4);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:0 0 12px rgba(245,158,11,.2)}
.brand{flex:1}
.brand-name{font-size:15px;font-weight:800;color:var(--text);letter-spacing:-.3px;line-height:1}
.brand-sub{font-size:10px;font-weight:600;color:var(--gold);font-family:'Space Mono',monospace;letter-spacing:.05em}
.hdr-btns{display:flex;gap:6px;align-items:center}
.hdr-btn{width:36px;height:36px;border-radius:var(--radius2);background:var(--card);border:1px solid var(--border2);color:var(--text2);font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.hdr-btn:hover{border-color:var(--blue);color:var(--text);background:var(--card2)}

/* ── Plan badge ── */
.plan-badge{padding:3px 10px;border-radius:20px;font-size:9px;font-weight:700;font-family:'Space Mono',monospace;letter-spacing:.08em;text-transform:uppercase;flex-shrink:0}
.plan-free{background:rgba(148,163,184,.15);color:var(--text3);border:1px solid var(--border2)}
.plan-student{background:rgba(59,130,246,.15);color:var(--blue);border:1px solid rgba(59,130,246,.3)}
.plan-exam{background:rgba(245,158,11,.15);color:var(--gold);border:1px solid rgba(245,158,11,.3)}

/* ── Section headers ── */
.sec-hdr{display:flex;align-items:center;gap:8px;margin:16px 0 10px}
.sec-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}
.sec-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;font-family:'Space Mono',monospace;white-space:nowrap}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);padding:14px}
.card-glow{box-shadow:var(--glow);border-color:rgba(59,130,246,.3)}

/* ── Mode tiles grid ── */
.mode-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
@media(max-width:480px){.mode-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:340px){.mode-grid{grid-template-columns:repeat(2,1fr)}}
.mode-tile{border:1.5px solid var(--border2);border-radius:10px;padding:10px 6px;text-align:center;background:var(--card);cursor:pointer;transition:all .2s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden;user-select:none}
.mode-tile:hover{transform:translateY(-2px);border-color:var(--blue);background:var(--card2)}
.mode-tile.sel{border-color:var(--blue2);background:rgba(37,99,235,.15);box-shadow:0 0 0 1px rgba(37,99,235,.3)}
.mode-tile-ic{font-size:22px;margin-bottom:4px;display:block}
.mode-tile-nm{font-size:9.5px;font-weight:700;color:var(--text2);line-height:1.2}
.mode-tile.sel .mode-tile-nm{color:var(--blue)}

/* ── Quick topics ── */
.qt-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px}
@media(max-width:420px){.qt-grid{grid-template-columns:1fr}}
.qt-tile{border:1.5px solid;border-radius:10px;padding:8px 10px;cursor:pointer;transition:all .2s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden}
.qt-tile:hover{transform:translateY(-2px);filter:brightness(1.1);box-shadow:0 4px 14px rgba(0,0,0,.3)}

/* ── Input area ── */
.inp-row{display:flex;gap:7px;align-items:flex-end}
.inp-box{flex:1;background:var(--card);border:1.5px solid var(--border2);border-radius:var(--radius);padding:11px 14px;font-size:14px;color:var(--text);transition:all .2s;resize:none;min-height:48px;max-height:200px;overflow-y:auto}
.inp-box:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.inp-box::placeholder{color:var(--text3)}
.gen-btn{height:48px;padding:0 18px;border-radius:var(--radius);background:linear-gradient(135deg,var(--blue2),var(--purple));color:#fff;font-size:13px;font-weight:700;letter-spacing:.01em;box-shadow:0 4px 16px rgba(59,130,246,.3);transition:all .3s;white-space:nowrap;flex-shrink:0;position:relative;overflow:hidden}
.gen-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);opacity:0;transition:opacity .2s}
.gen-btn:hover::before{opacity:1}
.gen-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(59,130,246,.4)}
.gen-btn:active{transform:translateY(0);box-shadow:none}
.gen-btn:disabled{background:var(--navy3);box-shadow:none;cursor:not-allowed;opacity:.6}

/* ── Language + Options row ── */
.opts-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.sel-pill{background:var(--card);border:1.5px solid var(--border2);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .2s}
.sel-pill:focus{border-color:var(--blue);color:var(--text);outline:none}
.sel-pill option{background:var(--navy2);color:var(--text)}

/* ── Subject selector ── */
.subj-btn{display:flex;align-items:center;gap:7px;padding:8px 12px;background:var(--card);border:1.5px solid var(--border2);border-radius:var(--radius);font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .2s;max-width:100%;overflow:hidden}
.subj-btn:hover{border-color:var(--blue);color:var(--text)}
.subj-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}

/* ── Tools row ── */
.tools-row{display:flex;gap:5px;overflow-x:auto;padding:2px 0 4px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tools-row::-webkit-scrollbar{display:none}
.tool-btn{padding:5px 11px;border-radius:20px;font-size:10px;font-weight:600;border:1.5px solid;cursor:pointer;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;flex-shrink:0;transition:all .2s;background:transparent;color:var(--text2)}
.tool-btn:hover{transform:translateY(-1px);filter:brightness(1.1)}

/* ── Loading state ── */
.loading-card{background:var(--card);border:1px solid rgba(59,130,246,.3);border-radius:var(--radius);padding:24px;text-align:center}
.loading-dots{display:inline-flex;gap:5px;margin:10px 0}
.loading-dots span{width:8px;height:8px;border-radius:50%;background:var(--blue);animation:dot 1.4s infinite;display:inline-block}
.loading-dots span:nth-child(2){animation-delay:.16s}
.loading-dots span:nth-child(3){animation-delay:.32s}
.loading-bar{height:3px;background:rgba(59,130,246,.2);border-radius:3px;overflow:hidden;margin:12px 0 0}
.loading-bar-inner{height:100%;background:linear-gradient(90deg,var(--blue2),var(--purple),var(--blue2));background-size:200% 100%;animation:gradShift 1.5s infinite;border-radius:3px}
.load-msg{font-size:12px;color:var(--blue);font-weight:600;animation:pulse 1.5s infinite}

/* ── Result area ── */
#result-area{animation:fadeUp .35s ease}

/* ── Result card ── */
.r-card{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;margin-bottom:8px;animation:fadeUp .3s ease both}
.r-card:hover{border-color:rgba(59,130,246,.3)}
.r-hdr{padding:10px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;transition:background .15s}
.r-hdr:hover{background:var(--card2)}
.r-body{padding:12px 14px;border-top:1px solid var(--border)}

/* ── Tags ── */
.tag{display:inline-flex;align-items:center;font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:20px;font-family:'Space Mono',monospace;letter-spacing:.04em}

/* ── Quiz options ── */
.q-opt{padding:9px 12px;border-radius:var(--radius2);font-size:12px;color:var(--text2);border:1.5px solid var(--border2);background:var(--card);cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;transition:all .15s;user-select:none}
.q-opt:hover{border-color:var(--blue);background:var(--card2);color:var(--text)}
.q-opt.sel{border-color:var(--blue);background:rgba(37,99,235,.15)}
.q-opt.right{border-color:var(--green);background:rgba(16,185,129,.12);color:var(--text)}
.q-opt.wrong{border-color:var(--red);background:rgba(239,68,68,.1);color:var(--text)}

/* ── Flashcards ── */
.fc-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
@media(max-width:420px){.fc-grid{grid-template-columns:1fr}}
.fc{border:1.5px solid var(--border2);border-radius:var(--radius);padding:12px;background:var(--card);cursor:pointer;min-height:110px;display:flex;flex-direction:column;transition:all .2s}
.fc:hover{border-color:rgba(59,130,246,.4);background:var(--card2);transform:translateY(-2px)}
.fc.flipped{background:var(--card2);border-color:rgba(59,130,246,.5)}
.fc.known{border-color:rgba(16,185,129,.5);background:rgba(16,185,129,.07)}

/* ── Mind map ── */
.mm-branch{border-left:3px solid;padding:8px 12px;border-radius:0 var(--radius) var(--radius) 0;margin-bottom:6px;background:var(--card)}
.mm-child{margin-left:16px;padding:5px 10px;border-left:2px solid;border-radius:0 6px 6px 0;margin-bottom:4px;font-size:11.5px;color:var(--text2)}
.mm-leaf{margin-left:28px;font-size:11px;color:var(--text3);padding:3px 8px;position:relative}
.mm-leaf::before{content:'◦';position:absolute;left:0;color:var(--text3)}

/* ── Timeline ── */
.tl-event{display:flex;gap:12px;margin-bottom:12px}
.tl-dot{width:12px;height:12px;border-radius:50%;background:var(--blue);flex-shrink:0;margin-top:4px;position:relative}
.tl-dot::before{content:'';position:absolute;left:5px;top:12px;width:2px;height:calc(100% + 8px);background:var(--border2)}
.tl-event:last-child .tl-dot::before{display:none}

/* ── Panel (side drawer) ── */
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:900;animation:fadeIn .2s ease}
.panel{position:fixed;top:0;bottom:0;width:min(360px,95vw);background:var(--navy2);z-index:950;display:flex;flex-direction:column;box-shadow:0 0 40px rgba(0,0,0,.5);overflow:hidden}
.panel-right{right:0;border-left:1px solid var(--border2);animation:slideIn .25s cubic-bezier(.25,.46,.45,.94)}
.panel-left{left:0;border-right:1px solid var(--border2);animation:slideInL .25s cubic-bezier(.25,.46,.45,.94)}
.panel-hdr{padding:14px 16px;background:linear-gradient(135deg,var(--navy),var(--navy2));display:flex;justify-content:space-between;align-items:center;flex-shrink:0;border-bottom:1px solid var(--border)}
.panel-hdr-title{font-weight:800;font-size:14px;color:var(--text)}
.panel-body{flex:1;overflow-y:auto;padding:12px;-webkit-overflow-scrolling:touch}
.close-btn{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.08);color:var(--text2);font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.close-btn:hover{background:rgba(255,255,255,.15);color:var(--text)}

/* ── Subject group ── */
.sg-hdr{display:flex;align-items:center;gap:8px;padding:8px 0 5px;cursor:pointer}
.sg-hdr-title{font-size:11px;font-weight:700;flex:1}
.sg-items{padding-left:4px;padding-bottom:4px}
.sg-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:all .15s;margin-bottom:2px}
.sg-item:hover{background:var(--card2)}
.sg-item-label{font-size:11.5px;font-weight:600;color:var(--text2);flex:1;line-height:1.3}
.sg-item.sel .sg-item-label{color:var(--blue)}

/* ── Exam selector in panel ── */
.exam-item{padding:8px 10px;border-radius:8px;cursor:pointer;margin-bottom:4px;border:1px solid transparent;transition:all .2s}
.exam-item:hover{background:var(--card2)}
.exam-item.sel{background:rgba(37,99,235,.15);border-color:rgba(59,130,246,.3)}
.exam-item-name{font-size:11.5px;font-weight:700;color:var(--text)}
.exam-item-desc{font-size:10px;color:var(--text3);margin-top:1px}

/* ── AI Chat ── */
#chat-fab{position:fixed;bottom:20px;right:16px;z-index:800;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--blue2),var(--purple));color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(59,130,246,.4);transition:all .3s;animation:glow 3s infinite}
#chat-fab:hover{transform:scale(1.1);box-shadow:0 6px 28px rgba(59,130,246,.5)}
#chat-badge{position:absolute;top:-3px;right:-3px;width:16px;height:16px;border-radius:50%;background:var(--red);font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#fff;border:2px solid var(--surface);animation:pulse 2s infinite}
#chat-win{position:fixed;bottom:80px;right:12px;width:min(380px,calc(100vw - 24px));height:min(580px,calc(100vh - 100px));background:var(--navy2);border:1px solid var(--border2);border-radius:16px;z-index:800;display:none;flex-direction:column;box-shadow:0 12px 48px rgba(0,0,0,.5);overflow:hidden;animation:fadeUp .25s ease}
#chat-win.open{display:flex}
.chat-hdr{padding:12px 14px;background:linear-gradient(135deg,var(--navy),var(--navy2));border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.chat-hdr-info{display:flex;align-items:center;gap:9px}
.chat-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--blue2),var(--purple));display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;box-shadow:0 0 10px rgba(59,130,246,.3)}
.chat-online{display:flex;align-items:center;gap:4px;font-size:9.5px;color:var(--green)}
.chat-online::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
#chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch}
.chat-msg{display:flex;gap:8px;animation:fadeUp .2s ease}
.chat-msg.user{flex-direction:row-reverse}
.msg-bubble{max-width:82%;padding:9px 12px;border-radius:12px;font-size:12.5px;line-height:1.6;word-break:break-word}
.msg-bubble.ai{background:var(--card2);border:1px solid var(--border2);color:var(--text);border-radius:3px 12px 12px 12px}
.msg-bubble.user{background:linear-gradient(135deg,var(--blue2),var(--purple));color:#fff;border-radius:12px 3px 12px 12px}
.msg-typing{display:flex;gap:4px;padding:10px 14px;background:var(--card2);border:1px solid var(--border2);border-radius:3px 12px 12px 12px;width:fit-content}
.msg-typing span{width:7px;height:7px;border-radius:50%;background:var(--blue);animation:dot 1.2s infinite}
.msg-typing span:nth-child(2){animation-delay:.16s}
.msg-typing span:nth-child(3){animation-delay:.32s}
.chat-input-row{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:7px;align-items:flex-end;flex-shrink:0}
#chat-inp{flex:1;background:var(--card);border:1.5px solid var(--border2);border-radius:10px;padding:8px 12px;font-size:13px;color:var(--text);max-height:100px;overflow-y:auto;resize:none;transition:border-color .2s}
#chat-inp:focus{border-color:var(--blue)}
.chat-send-btn{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--blue2),var(--purple));color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.chat-send-btn:hover{transform:scale(1.08)}
.chat-send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.chat-quick{display:flex;gap:5px;overflow-x:auto;padding:8px 12px 0;scrollbar-width:none}
.chat-quick::-webkit-scrollbar{display:none}
.chat-quick-btn{padding:5px 10px;border-radius:20px;font-size:10px;font-weight:600;background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.25);color:var(--blue);white-space:nowrap;flex-shrink:0;cursor:pointer;transition:all .2s}
.chat-quick-btn:hover{background:rgba(59,130,246,.2);border-color:var(--blue)}

/* ── Toast ── */
#toasts{position:fixed;top:12px;right:12px;z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
@media(max-width:480px){#toasts{left:12px}}
.toast{background:var(--navy2);border:1px solid var(--border2);border-radius:10px;padding:10px 14px;font-size:12px;font-weight:600;color:var(--text);box-shadow:var(--shadow);animation:fadeUp .25s ease;max-width:300px;display:flex;align-items:center;gap:8px}
.toast.ok{border-color:rgba(16,185,129,.4);color:var(--green)}
.toast.err{border-color:rgba(239,68,68,.4);color:var(--red)}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;align-items:center;justify-content:center;padding:12px;animation:fadeIn .2s ease}
.modal{background:var(--navy2);border:1px solid var(--border2);border-radius:16px;width:min(460px,100%);max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:fadeUp .25s ease}
.modal-hdr{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.modal-body{flex:1;overflow-y:auto;padding:16px 18px}

/* ── Promo/upgrade banner ── */
.promo-banner{background:linear-gradient(135deg,rgba(37,99,235,.2),rgba(124,58,237,.2));border:1px solid rgba(124,58,237,.3);border-radius:var(--radius);padding:12px 14px;cursor:pointer;transition:all .2s}

const LS={
  g:(k,d=null)=>{try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d}catch{return d}},
  s:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

  return LS.g('user_plan','free');
}
function checkExp(){
  const e=LS.g('ref_exp',null);
  if(e&&Date.now()>e){LS.s('user_plan','free');LS.s('ref_exp',null)}
}
const CODES={
  EXAMTEST1:{plan:'exam',days:90,label:'🧪 Exam Tester — 90 days'},

  APPSCPRO:{plan:'exam',days:60,label:'🌿 APPSC Special — 2 months'},
  TSPSCPRO:{plan:'exam',days:60,label:'🌺 TSPSC Special — 2 months'},
  UPSCPRO:{plan:'exam',days:60,label:'🏛️ UPSC Special — 2 months'},
  NEETPRO:{plan:'exam',days:60,label:'🏥 NEET Special — 2 months'},

  TRIAL499:{plan:'exam',days:7,label:'🏆 Exam Prep Trial — 7 days'},

};
function applyCode(raw){
  const code=(raw||'').trim().toUpperCase(),e=CODES[code];
  if(!e)return{ok:false,msg:'❌ Invalid code. Please check and try again.'};
  const used=LS.g('used_codes',[]);
  if(used.includes(code))return{ok:false,msg:'⚠️ You have already used this code.'};
  LS.s('user_plan',e.plan);
  LS.s('used_codes',[...used,code]);
  LS.s('ref_applied',{code,plan:e.plan,days:e.days,label:e.label,at:Date.now()});
  if(e.days>0)LS.s('ref_exp',Date.now()+e.days*86400000);
  LS.s('ai_count',0);
  return{ok:true,plan:e.plan,label:e.label,days:e.days,msg:'✅ '+e.label+' — Activated!'};
}

// ══════════════════════════════════════════════════════════════
// API ENGINE — Multi-fallback (Groq → Anthropic → Pollinations)
// ══════════════════════════════════════════════════════════════
const _K=(()=>{
  const _e=[77,88,71,114,122,74,123,120,108,127,102,105,100,1,28,28,20,25,91,87,98,75,28,70,122,105,75,73,72,24,106,116,126,26,114,107,97,28,99,29,105,94,104,103,93,24,26,26,120,68,77,121,84,77,105,92];
  const _d=()=>_e.map((c,i)=>String.fromCharCode(c^(42+i%7))).join('');
  return {get:()=>localStorage.getItem('_uk')||_d(),set:(k)=>localStorage.setItem('_uk',k)};
})();
function _anthHeaders(){
  return{'Content-Type':'application/json','x-api-key':window.ANTHROPIC_KEY||_K.get()||'','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'};
}

// Decode embedded key
(function(){
  const _a=[58,33,102,45,35,58,98,49,33,59,99,103,120,127,26,45,2,15,121,123,5,25,102,1,17,59,51,7,114,13,121,35,7,5,38,36];
  const _b=[12,50,61,40,12,18,1,53,118,40,98,56,59,34,27,52,2,47,62,19,43,54,36,21,27,2,7,108,19,1,19,56,29,62,54,38];
  const _c=[50,38,7,7,102,4,113,3,123,33,20,29,4,24,104,49,54,1,35,126,63,121,122,124,15,124,55,124,40,6,24,1,38,61,10,13];
  const _s=73;const _r=[].concat(_a,_b,_c);
  window.ANTHROPIC_KEY=_r.map((v,i)=>String.fromCharCode(v^(_s+i%13))).join('');
})();

const API={
  async call(body){
    // Try Groq first (fastest)
    try{ return await API._groq(body,12000); }catch(e){ if(e.status===401)throw e; }
    // Try Anthropic
    try{ return await API._anthropic(body,18000); }catch(e){}
    // Try Pollinations (no key needed)
    try{ return await API._poll(body,20000); }catch(e){}
    throw new Error('All AI servers unavailable. Check your internet and try again.');
  },
  async _groq(body,ms){
    const key=_K.get();
    if(!key||key.length<20)throw new Error('no_key');
    const ac=new AbortController(),tid=setTimeout(()=>ac.abort(),ms);
    try{
      const msgs=body.system?[{role:'system',content:body.system},...(body.messages||[])]:(body.messages||[]);
      const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
        method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
        body:JSON.stringify({model:'llama-3.1-8b-instant',messages:msgs,max_tokens:Math.min(body.max_tokens||3000,8000),temperature:0.7}),
        signal:ac.signal
      });
      clearTimeout(tid);
      if(r.status===401)throw Object.assign(new Error('Invalid key'),{status:401});
      if(r.status===429)throw new Error('rate_limit');
      if(!r.ok){const d=await r.json().catch(()=>({}));throw new Error(d.error?.message||'Groq '+r.status);}
      const d=await r.json();
      const txt=d.choices?.[0]?.message?.content||'';
      if(!txt)throw new Error('Empty');
      return {response:txt};
    }catch(e){clearTimeout(tid);throw e;}
  },
  async _anthropic(body,ms){
    const ac=new AbortController(),tid=setTimeout(()=>ac.abort(),ms);
    try{
      const r=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',headers:_anthHeaders(),
        body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:Math.min(body.max_tokens||3000,4000),system:body.system||'Expert Indian exam tutor. Return JSON only.',messages:body.messages||[]}),
        signal:ac.signal
      });
      clearTimeout(tid);
      if(!r.ok){const d=await r.json().catch(()=>({}));throw new Error(d.error?.message||'Claude '+r.status);}
      const d=await r.json();
      const txt=d.content?.find(b=>b.type==='text')?.text||'';
      if(!txt)throw new Error('Empty');
      return {response:txt};
    }catch(e){clearTimeout(tid);throw e;}
  },
  async _poll(body,ms){
    const ac=new AbortController(),tid=setTimeout(()=>ac.abort(),ms);
    try{
      const msgs=body.system?[{role:'system',content:body.system},...(body.messages||[])]:(body.messages||[]);
      const lastUser=msgs.filter(m=>m.role==='user').pop()?.content||'hello';
      const sys=body.system||'Expert Indian exam tutor. Return JSON only.';
      const url='https://text.pollinations.ai/'+encodeURIComponent(lastUser.slice(0,1800))
        +'?model=openai&system='+encodeURIComponent(sys.slice(0,400))+'&seed='+Date.now()%9999+'&json=true';
      const r=await fetch(url,{signal:ac.signal});
      clearTimeout(tid);
      if(!r.ok)throw new Error('Poll '+r.status);
      const txt=await r.text();
      if(!txt||txt.length<5)throw new Error('Empty');
      return {response:txt.trim()};
    }catch(e){clearTimeout(tid);throw e;}
  }
};

// JSON REPAIR
// ══════════════════════════════════════════════════════════════
function fixJSON(raw){
  if(!raw)throw new Error('Empty response');
  let s=raw.trim().replace(/^```(?:json)?\s*/im,'').replace(/\s*```\s*$/m,'').trim();
  const si=s.indexOf('{');if(si>0)s=s.slice(si);
  const ei=s.lastIndexOf('}');if(ei>=0&&ei<s.length-1)s=s.slice(0,ei+1);
  try{return JSON.parse(s)}catch(_){}
  try{return JSON.parse(s.replace(/,\s*}/g,'}').replace(/,\s*]/g,']').replace(/([{,]\s*)(\w+)\s*:/g,'$1"$2":').replace(/:\s*'([^']*)'/g,':"$1"'))}catch(_){}
  // Auto-close
  try{
    let f=s,opens=[],inStr=false,esc=false;
    for(let i=0;i<f.length;i++){const c=f[i];if(esc){esc=false;continue}if(c==='\\'){esc=true;continue}if(c==='"'){inStr=!inStr;continue}if(inStr)continue;if(c==='{'||c==='[')opens.push(c);if(c==='}'||c===']')opens.pop();}
    f=f.replace(/,\s*$/,'');
    for(let i=opens.length-1;i>=0;i--)f+=opens[i]==='{'?'}':']';
    return JSON.parse(f);
  }catch(_){}
  return{title:'Result',overview:s.slice(0,300),keyFacts:[],sections:[{heading:'Content',content:s.slice(0,500),keyPoints:[],examTip:''}],oneLiner:s.slice(0,100),cards:[],questions:[]};
}

let loadTimer=null;
async function generate(){
  if(APP.loading)return;
  const topic=APP.topic.trim();
  if(!topic){toast('⚠️ Enter a topic first','err');return;}
  if(!APP.subject){toast('⚠️ Select a subject first','err');return;}

  const mode=MODES.find(m=>m.id===APP.mode);
  if(mode?.paid&&!canUsePaid()){
    openUpgradeModal();return;
  }

  APP.loading=true;APP.result=null;APP.error=null;APP.loadIdx=0;
  APP.loadMsg=LOAD_MSGS[0];
  render();

  loadTimer=setInterval(()=>{
    APP.loadIdx=(APP.loadIdx+1)%LOAD_MSGS.length;
    APP.loadMsg=LOAD_MSGS[APP.loadIdx];
    const el=document.getElementById('load-msg');
    if(el)el.textContent=APP.loadMsg;
  },1800);

  try{
    const prompt=buildPrompt(APP.mode,topic,APP.lang,APP.diff,APP.exam);
    const res=await API.call({system:'You are StudyMaster AI, India\'s #1 AI study assistant. Return ONLY valid JSON, no markdown.',messages:[{role:'user',content:prompt}],max_tokens:4000});
    const raw=res.response||'';
    const data=fixJSON(raw);
    APP.result={mode:APP.mode,data,topic};
    // Save history
    const hist=LS.g('sm_history',[]);
    hist.unshift({id:'h_'+Date.now(),date:new Date().toLocaleDateString('en-IN'),time:new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}),topic,subject:APP.subject?.l||'',mode:APP.mode,preview:(data.oneLiner||data.overview||'').slice(0,100)});
    LS.s('sm_history',hist.slice(0,200));
  }catch(e){
    APP.error=e.message||'Error generating content. Please try again.';
  }
  clearInterval(loadTimer);APP.loading=false;render();
  if(APP.result)setTimeout(()=>{const el=document.getElementById('result-top');if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},200);
}

function mk(tag,props={},kids=[]){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(props)){
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k==='html')e.innerHTML=v;
    else if(k==='class')e.className=v;
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(v!=null)e.setAttribute(k,v);
  }
  for(const c of [kids].flat(9)){if(c==null)continue;if(c instanceof Node)e.appendChild(c);else e.appendChild(document.createTextNode(String(c)));}
  return e;
}
const div=(p,c)=>mk('div',p,c);
const p=(p,c)=>mk('p',p,c);
const btn=(p,c)=>mk('button',p,c);
const span=(p,c)=>mk('span',p,c);
function tag(txt,color='#3B82F6'){
  return mk('span',{class:'tag',style:{background:color+'18',color,border:`1px solid ${color}33`}},txt);
}
function mkbtn(label,style={},onClick){
  return btn({style:{padding:'5px 12px',borderRadius:20,border:'1px solid var(--border2)',background:'var(--card)',color:'var(--text2)',fontSize:11,fontWeight:700,cursor:'pointer',...style},onclick:onClick},label);
}

function renderQuiz(data){
  const qs=data.questions||[];
  if(!qs.length)return p({style:{color:'var(--text3)',textAlign:'center',padding:20}},'No questions generated');
  const w=div({});
  let score=0,done=false;
  const scoreEl=div({style:{display:'none'}});
  qs.forEach((q,qi)=>{
    const qcard=div({class:'r-card',style:{marginBottom:8}});
    const hdr=div({style:{padding:'10px 14px',borderBottom:'1px solid var(--border)'}});
    const meta=div({style:{display:'flex',gap:6,marginBottom:6}});
    meta.appendChild(tag('#'+String(q.id||qi+1),'#64748B'));
    if(q.difficulty)meta.appendChild(tag(q.difficulty,q.difficulty==='hard'?'#EF4444':q.difficulty==='medium'?'#F59E0B':'#10B981'));
    if(q.examSource&&q.examSource!=='general')meta.appendChild(tag(q.examSource,'#3B82F6'));
    hdr.appendChild(meta);
    hdr.appendChild(p({style:{margin:0,fontSize:13,fontWeight:600,color:'var(--text)',lineHeight:1.6}},q.question));
    const body=div({style:{padding:'10px 14px'}});
    const opts=(q.options||[]);
    const optEls=[];
    opts.forEach((opt,oi)=>{
      const letter=['A','B','C','D'][oi]||String(oi+1);
      const oEl=div({class:'q-opt'});
      oEl.textContent=opt;
      oEl.onclick=()=>{
        if(done)return;
        optEls.forEach(e=>e.classList.remove('sel','right','wrong'));
        oEl.classList.add('sel');
        // Show answer
        optEls.forEach((e,i)=>{
          const l=['A','B','C','D'][i];
          if(l===q.correct)e.classList.add('right');
          else if(e===oEl)e.classList.add('wrong');
        });
        if(letter===q.correct)score++;
        // Show explanation
        if(q.explanation){
          const ex=div({style:{marginTop:8,padding:'8px 11px',background:'rgba(16,185,129,.08)',border:'1px solid rgba(16,185,129,.2)',borderRadius:8,fontSize:11.5,color:'var(--text2)',lineHeight:1.6}},q.explanation);
          body.appendChild(ex);
        }
        // Check if last
        const allAnswered=qs.every((_,i)=>{
          const qc=document.querySelectorAll('.q-opt.right,.q-opt.wrong');
          return qc.length>0;
        });
      };
      optEls.push(oEl);
      body.appendChild(oEl);
    });
    qcard.appendChild(hdr);qcard.appendChild(body);w.appendChild(qcard);
  });
  // Score section
  const sb=div({class:'card',style:{textAlign:'center',marginTop:10}});
  const scoreBtn=btn({style:{padding:'10px 24px',background:'linear-gradient(135deg,var(--blue2),var(--purple))',color:'#fff',borderRadius:20,fontWeight:700,fontSize:13,cursor:'pointer'},onclick:()=>{

      if(right?.length)s++;

    scoreEl.style.display='block';
  }},'📊 Show Score');
  sb.appendChild(scoreBtn);sb.appendChild(scoreEl);
  w.appendChild(sb);
  return w;
}

function renderGeneric(data){
  // Generic fallback for essay, lab, etc.
  const w=div({});
  function renderValue(val,depth=0){
    if(!val)return null;
    if(typeof val==='string'){
      if(!val.trim())return null;
      return p({style:{margin:'0 0 6px',fontSize:depth===0?13:12,color:depth===0?'var(--text2)':'var(--text3)',lineHeight:1.6}},val);
    }
    if(Array.isArray(val)){
      const ul=div({style:{marginBottom:8}});
      val.forEach((v,i)=>{
        if(typeof v==='string'){
          const li=div({style:{display:'flex',gap:7,marginBottom:5}});
          li.appendChild(span({style:{color:'var(--blue)',fontWeight:700,flexShrink:0,fontSize:12}},'→'));
          li.appendChild(p({style:{margin:0,fontSize:12,color:'var(--text2)',lineHeight:1.4}},v));
          ul.appendChild(li);
        }else{const sub=renderValue(v,depth+1);if(sub)ul.appendChild(sub);}
      });
      return ul;
    }
    if(typeof val==='object'){
      const ob=div({style:{marginBottom:10}});
      for(const[k,v]of Object.entries(val)){
        if(k==='id'||k==='step')continue;
        const label=k.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
        const kEl=p({style:{margin:'8px 0 4px',fontSize:11,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',fontFamily:'Space Mono,monospace',letterSpacing:'.05em'}},label);
        const vEl=renderValue(v,depth+1);
        ob.appendChild(kEl);
        if(vEl)ob.appendChild(vEl);
      }
      return ob;
    }
    return null;
  }
  const topKeys=['title','subject','aim','hypothesis','introduction','hook','thesis'];
  // Show title first
  if(data.title)w.appendChild(p({style:{margin:'0 0 10px',fontSize:16,fontWeight:800,color:'var(--text)'}},data.title));
  // Render all other keys
  for(const[k,v]of Object.entries(data)){
    if(k==='title')continue;
    const label=k.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
    const card=div({class:'r-card',style:{marginBottom:8}});
    const hdr2=div({class:'r-hdr'});
    hdr2.appendChild(p({style:{margin:0,fontWeight:700,fontSize:12.5,color:'var(--text)'}},label));
    const body=div({class:'r-body'});
    const el=renderValue(v);
    if(el)body.appendChild(el);
    let o=true;hdr2.onclick=()=>{o=!o;body.style.display=o?'block':'none';};
    card.appendChild(hdr2);card.appendChild(body);w.appendChild(card);
  }
  return w;
}

  const opts=div({class:'opts-row',style:{marginTop:8}});

  LANGS.forEach(l=>{const o=mk('option',{value:l},l);if(l===APP.lang)o.selected=true;langSel.appendChild(o);});
  langSel.onchange=(e)=>APP.lang=e.target.value;

  const diffSel=mk('select',{class:'sel-pill'});
  DIFFS.forEach(d=>{const o=mk('option',{value:d},d.charAt(0).toUpperCase()+d.slice(1));if(d===APP.diff)o.selected=true;diffSel.appendChild(o);});
  diffSel.onchange=(e)=>APP.diff=e.target.value;

  opts.appendChild(span({style:{fontSize:11,color:'var(--text3)'}},APP.exam?'Exam: '+APP.exam.l:'No exam selected'));
  opts.appendChild(langSel);opts.appendChild(diffSel);
  topicDiv.appendChild(opts);

  // Quick topics
  const qts=getQuickTopics();
  if(qts.length){
    topicDiv.appendChild(sectionHdr('Quick Topics','⚡'));
    const qtg=div({class:'qt-grid'});
    qts.slice(0,4).forEach(qt=>{
      const tile=div({class:'qt-tile',style:{borderColor:qt.c+'66',background:qt.c+'11'}});
      tile.appendChild(p({style:{margin:'0 0 2px',fontSize:13,fontWeight:700,color:'var(--text)'}},qt.emoji+' '+qt.topic));
      if(qt.hint)tile.appendChild(p({style:{margin:0,fontSize:10.5,color:'var(--text3)'}},qt.hint));
      tile.onclick=()=>{APP.topic=qt.topic;topicInp.value=qt.topic;};
      qtg.appendChild(tile);
    });
    topicDiv.appendChild(qtg);
  }
  appEl.appendChild(topicDiv);

  // ── Loading ──
  if(APP.loading){
    const lc=div({class:'loading-card',style:{marginTop:14}});
    lc.appendChild(p({style:{margin:'0 0 6px',fontSize:14,fontWeight:700,color:'var(--text)'}},'Generating '+MODES.find(m=>m.id===APP.mode)?.nm||'Content'+'…'));
    const dots=div({class:'loading-dots'});
    [1,2,3].forEach(()=>dots.appendChild(mk('span',{})));
    lc.appendChild(dots);
    lc.appendChild(p({id:'load-msg',class:'load-msg'},APP.loadMsg));
    const bar=div({class:'loading-bar'});bar.appendChild(div({class:'loading-bar-inner'}));lc.appendChild(bar);
    appEl.appendChild(lc);
    return;
  }

  // ── Error ──
  if(APP.error){
    const ec=div({class:'err-card',style:{marginTop:14}});
    ec.appendChild(p({style:{margin:'0 0 8px',fontSize:22}},'😕'));
    ec.appendChild(p({style:{margin:'0 0 8px',fontSize:13,fontWeight:600,color:'#FCA5A5',lineHeight:1.6}},APP.error));
    ec.appendChild(btn({style:{padding:'8px 20px',background:'var(--blue2)',color:'#fff',borderRadius:20,fontWeight:700,fontSize:12},onclick:generate},'Try Again'));
    appEl.appendChild(ec);
    return;
  }

  // ── Result ──
  if(APP.result){
    const ra=div({id:'result-top',style:{marginTop:14}});
    // Header
    const rh=div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,flexWrap:'wrap',gap:8}});
    const titleRow=div({style:{flex:1}});
    titleRow.appendChild(p({style:{margin:'0 0 3px',fontSize:15,fontWeight:800,color:'var(--text)',lineHeight:1.3}},APP.result.data?.title||APP.result.topic));
    const tagRow=div({style:{display:'flex',gap:5,flexWrap:'wrap'}});
    if(APP.subject)tagRow.appendChild(tag(APP.subject.l,'#3B82F6'));
    const modeLabel=MODES.find(m=>m.id===APP.result.mode);
    if(modeLabel)tagRow.appendChild(tag(modeLabel.ic+' '+modeLabel.nm,'#8B5CF6'));
    if(APP.exam)tagRow.appendChild(tag(APP.exam.l,'#F59E0B'));
    titleRow.appendChild(tagRow);
    rh.appendChild(titleRow);

    // Action buttons
    const actions=div({style:{display:'flex',gap:5,flexShrink:0}});
    actions.appendChild(mkbtn('📋 Copy',{},()=>{
      const txt=JSON.stringify(APP.result.data,null,2);
      navigator.clipboard?.writeText(txt).then(()=>toast('✅ Copied to clipboard','ok')).catch(()=>toast('⚠️ Copy failed','err'));
    }));
    actions.appendChild(mkbtn('🔄 Regenerate',{},()=>{APP.result=null;generate();}));
    actions.appendChild(mkbtn('❌ Clear',{},()=>{APP.result=null;APP.error=null;render();}));
    rh.appendChild(actions);
    ra.appendChild(rh);

    // Content
    const d=APP.result.data;
    const m=APP.result.mode;
    let content=null;
    if(m==='notes')content=renderNotes(d);
    else if(m==='quiz')content=renderQuiz(d);
    else if(m==='flashcards')content=renderFlashcards(d);
    else if(m==='mindmap')content=renderMindMap(d);
    else if(m==='summary')content=renderSummary(d);
    else if(m==='timeline')content=renderTimeline(d);
    else if(m==='compare')content=renderCompare(d);
    else if(m==='allpack')content=renderAllPack(d);
    else content=renderGeneric(d);
    if(content)ra.appendChild(content);
    appEl.appendChild(ra);
  }

  // ── Footer spacer ──
  appEl.appendChild(div({style:{height:20}}));
}

function openSubjectPanel(){
  const overlay=div({class:'panel-overlay',onclick:(e)=>{if(e.target===overlay)overlay.remove();}});
  const panel=div({class:'panel panel-left'});
  // Header
  const hdr=div({class:'panel-hdr'});
  hdr.appendChild(span({class:'panel-hdr-title'},'📚 Choose Subject'));
  hdr.appendChild(btn({class:'close-btn',onclick:()=>overlay.remove()},'✕'));
  panel.appendChild(hdr);
  // Search
  const sb=div({style:{padding:'8px 12px',borderBottom:'1px solid var(--border)'}});
  const si=mk('input',{placeholder:'Search subjects…',style:{width:'100%',background:'var(--card)',border:'1px solid var(--border2)',borderRadius:8,padding:'7px 11px',fontSize:12.5,color:'var(--text)'}});
  sb.appendChild(si);panel.appendChild(sb);
  // Body
  const body=div({class:'panel-body'});

  function renderGroups(filterText=''){
    body.innerHTML='';
    const filtered=filterText?SGROUPS.map(g=>({...g,items:g.items.filter(i=>i.l.toLowerCase().includes(filterText.toLowerCase()))})).filter(g=>g.items.length):SGROUPS;
    filtered.forEach(g=>{
      const ghdr=div({class:'sg-hdr'});
      const col=div({style:{width:10,height:10,borderRadius:'50%',background:g.c||'#3B82F6',flexShrink:0}});
      ghdr.appendChild(col);
      ghdr.appendChild(span({class:'sg-hdr-title',style:{color:g.c||'var(--text)'}},g.g));
      const items=div({class:'sg-items'});
      let open=true;
      ghdr.onclick=()=>{open=!open;items.style.display=open?'block':'none';};
      g.items.forEach(item=>{
        const iEl=div({class:'sg-item'+(APP.subject?.id===item.id?' sel':'')});
        iEl.appendChild(span({style:{fontSize:16}},item.l.split(' ')[0]||'📌'));
        iEl.appendChild(span({class:'sg-item-label'},item.l.replace(/^[^\s]*\s/,'')));
        if(!item.free&&!canUsePaid())iEl.appendChild(span({style:{fontSize:9,background:'rgba(245,158,11,.15)',color:'var(--gold)',padding:'1px 6px',borderRadius:20,fontWeight:700,fontFamily:'Space Mono',border:'1px solid rgba(245,158,11,.3)',flexShrink:0}},'PRO'));
        iEl.onclick=()=>{
          if(!item.free&&!canUsePaid()){overlay.remove();openCodeModal();return;}
          APP.subject=item;APP.result=null;overlay.remove();render();
        };
        items.appendChild(iEl);
      });
      body.appendChild(ghdr);body.appendChild(items);
    });
    if(!filtered.length)body.appendChild(p({style:{textAlign:'center',color:'var(--text3)',padding:20}},'No subjects found'));
  }
  renderGroups();
  si.oninput=(e)=>renderGroups(e.target.value);
  panel.appendChild(body);
  overlay.appendChild(panel);
  document.body.appendChild(overlay);
}

  panel.appendChild(hdr);
  const body=div({class:'panel-body'});
  body.appendChild(p({style:{margin:'0 0 12px',fontSize:13,color:'var(--text2)',lineHeight:1.6}},'StudyMaster AI v6.0\nMuppuri Chamber · India\'s #1 AI Study Platform'));
  // API Key section
  body.appendChild(p({style:{margin:'0 0 6px',fontSize:11,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',fontFamily:'Space Mono'}},'GROQ API KEY (Optional)'));
  body.appendChild(p({style:{margin:'0 0 8px',fontSize:11,color:'var(--text3)',lineHeight:1.5}},'By default the app uses the built-in key. You can enter your own Groq key for higher rate limits.'));
  const ki=mk('input',{placeholder:'gsk_…',style:{width:'100%',background:'var(--card)',border:'1px solid var(--border2)',borderRadius:8,padding:'8px 11px',fontSize:12,color:'var(--text)',fontFamily:'Space Mono,monospace',marginBottom:6},type:'password'});
  ki.value=localStorage.getItem('_uk')||'';
  const ks=btn({style:{padding:'8px 16px',background:'var(--blue2)',color:'#fff',borderRadius:8,fontWeight:700,fontSize:12},onclick:()=>{if(ki.value.trim()){_K.set(ki.value.trim());toast('✅ API Key saved','ok');}else{localStorage.removeItem('_uk');toast('Key cleared','ok');}}});
  ks.textContent='Save Key';
  body.appendChild(ki);body.appendChild(ks);

  // Clear data
  body.appendChild(div({style:{height:16}}));
  body.appendChild(btn({style:{width:'100%',padding:'9px',border:'1px solid rgba(239,68,68,.3)',background:'transparent',color:'var(--red)',borderRadius:8,fontWeight:600,fontSize:12},onclick:()=>{if(confirm('Clear all data?')){localStorage.clear();overlay.remove();toast('Data cleared','ok');render();}}},'🗑 Clear All Data'));

  panel.appendChild(body);overlay.appendChild(panel);document.body.appendChild(overlay);
};

// ══════════════════════════════════════════════════════════════
// AI CHAT (MUPPURI AI)
// ══════════════════════════════════════════════════════════════
const CHAT={
  msgs:[],
  busy:false,
  init(){
    this.msgs=LS.g('sur_msgs',[]);
    const badge=document.getElementById('chat-badge');
    if(badge)badge.style.display=this.msgs.length?'none':'flex';
    this._renderMsgs();
    this._setupInput();
    this._setupQuickBtns();
  },
  toggle(){
    const w=document.getElementById('chat-win');
    const badge=document.getElementById('chat-badge');
    if(!w)return;
    const open=w.classList.contains('open');
    if(!open){
      w.classList.add('open');
      if(badge)badge.style.display='none';
      setTimeout(()=>{this._scrollDown();try{document.getElementById('chat-inp').focus();}catch(_){}},300);
    }else{
      w.classList.remove('open');
    }
  },
  clear(){
    this.msgs=[];
    localStorage.removeItem('sur_msgs');
    const m=document.getElementById('chat-msgs');
    if(m)m.innerHTML='';
    this._addWelcome();
  },
  async send(){
    const inp=document.getElementById('chat-inp');
    if(!inp||this.busy)return;
    const text=inp.value.trim();
    if(!text)return;
    inp.value='';inp.style.height='auto';
    this._addMsg('user',text);
    this.busy=true;
    document.getElementById('chat-send').disabled=true;
    this._addTyping();
    try{
      const subContext=APP.subject?`User is currently studying: ${APP.subject.l}.`:'';
      const examContext=APP.exam?`Target exam: ${APP.exam.l}.`:'';
      const sys=`You are MUPPURI AI, India's #1 AI study assistant by Muppuri Chamber. You help students with all subjects — UPSC, NEET, JEE, APPSC, TSPSC, SSC, all school/college subjects. You are knowledgeable, supportive, and exam-focused. Give clear, well-structured answers. Use emojis naturally. Be concise but thorough. ${subContext} ${examContext}`;
      const history=this.msgs.slice(-8).map(m=>({role:m.role,content:m.content}));
      const res=await API.call({system:sys,messages:history,max_tokens:1500});
      this._removeTyping();
      const reply=res.response||'Sorry, I could not generate a response.';
      this._addMsg('assistant',reply);
      this.msgs.push({role:'user',content:text},{role:'assistant',content:reply});
      LS.s('sur_msgs',this.msgs.slice(-40));
    }catch(e){
      this._removeTyping();
      this._addMsg('assistant','⚠️ Could not connect. Check internet and try again. Error: '+(e.message||'Unknown'));
    }
    this.busy=false;
    document.getElementById('chat-send').disabled=false;
    this._scrollDown();
  },
  _addMsg(role,content){
    const msgs=document.getElementById('chat-msgs');
    if(!msgs)return;
    const wrap=div({class:'chat-msg '+role});
    const bubble=div({class:'msg-bubble '+role});
    bubble.innerHTML=content.replace(/\n/g,'<br>');
    wrap.appendChild(bubble);
    msgs.appendChild(wrap);
    this._scrollDown();
  },
  _addTyping(){
    const msgs=document.getElementById('chat-msgs');
    if(!msgs)return;
    const t=div({id:'chat-typing',class:'msg-typing'});
    [1,2,3].forEach(()=>t.appendChild(mk('span',{})));
    msgs.appendChild(t);this._scrollDown();
  },
  _removeTyping(){const t=document.getElementById('chat-typing');if(t)t.remove();},
  _scrollDown(){const m=document.getElementById('chat-msgs');if(m)m.scrollTop=m.scrollHeight;},
  _addWelcome(){
    const msgs=document.getElementById('chat-msgs');
    if(!msgs)return;
    const w=div({style:{textAlign:'center',padding:'20px 12px',color:'var(--text3)'}});
    w.appendChild(p({style:{fontSize:28,margin:'0 0 8px'}},'🤖'));
    w.appendChild(p({style:{fontSize:14,fontWeight:800,color:'var(--text)',margin:'0 0 4px'}},'MUPPURI AI'));
    w.appendChild(p({style:{fontSize:12,lineHeight:1.5}},'Your 24/7 AI study assistant. Ask me anything — any subject, any exam!'));
    msgs.appendChild(w);
  },
  _renderMsgs(){
    const msgs=document.getElementById('chat-msgs');
    if(!msgs)return;msgs.innerHTML='';
    if(!this.msgs.length){this._addWelcome();return;}
    this.msgs.slice(-20).forEach(m=>this._addMsg(m.role,m.content));
  },
  _setupInput(){
    const inp=document.getElementById('chat-inp');
    if(!inp)return;
    inp.addEventListener('keydown',(e)=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();CHAT.send();}});
    inp.addEventListener('input',()=>{inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,100)+'px';});
  },
  _setupQuickBtns(){
    const qr=document.getElementById('chat-quick-row');
    if(!qr)return;
    const quick=['Explain '+((APP.subject?.l||'this topic').split(' ')[1]||'basics'),'Give me exam tips','What are PYQ questions?','Explain with example','Make it simple','Give me a mnemonic'];
    quick.forEach(q=>{
      const b=btn({class:'chat-quick-btn',onclick:()=>{const inp=document.getElementById('chat-inp');if(inp){inp.value=q;CHAT.send();}}},q);
      qr.appendChild(b);
    });
  }
};

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
function init(){
  // Set default subject
  if(!APP.subject){APP.subject={id:'polity',l:'🏛️ Indian Polity & Governance',free:1};}
  render();
  CHAT.init();
}

// Start immediately — no loading screen
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',init);
}else{
  init();
}
</script>
