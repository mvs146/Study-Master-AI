<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5"/>
<meta name="theme-color" content="#0F172A"/>
<title>StudyMaster AI — Muppuri Chamber</title>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="StudyMaster AI"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:system-ui,-apple-system,sans-serif;background:#EFF6FF;color:#1E3A5F;min-height:100vh;overflow-x:hidden;-webkit-overflow-scrolling:touch}
button{cursor:pointer;font-family:inherit;border:none;transition:opacity .15s;touch-action:manipulation}
button:active{opacity:.8}
input,select,textarea{font-family:inherit;outline:none;-webkit-appearance:none;appearance:none}
select{cursor:pointer}
textarea{resize:vertical}

/* Animations */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{opacity:.6}50%{opacity:1}100%{opacity:.6}}

/* Toasts */
#toasts{position:fixed;top:14px;right:14px;z-index:99999;display:flex;flex-direction:column;gap:6px;max-width:300px;pointer-events:none}
.toast{padding:9px 13px;border-radius:9px;font-size:11px;font-weight:600;border-left:3px solid;animation:fadeUp .2s ease;box-shadow:0 4px 14px rgba(0,0,0,.14);background:#fff;color:#1E3A5F}

/* App wrapper */
#app{max-width:880px;margin:0 auto;padding:.5rem .75rem 3rem}

/* Header */
.hdr{background:linear-gradient(135deg,#0F172A 0%,#1E3A5F 55%,#1E1B4B 100%);border-radius:14px;padding:10px 14px 9px;margin-bottom:10px;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.hdr-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;gap:8px}
.hdr-logo{display:flex;align-items:center;gap:9px}
.hdr-shield{width:38px;height:38px;flex-shrink:0}
.hdr-name{color:#fff;font-size:16px;font-weight:700;line-height:1.1}
.hdr-brand{color:#D4A017;font-size:8px;font-weight:800;letter-spacing:.1em;text-transform:uppercase}
.hdr-owners{color:rgba(212,160,23,.65);font-size:7px;margin-top:1px}
.hdr-plan{background:rgba(59,130,246,.2);border:1px solid rgba(59,130,246,.4);border-radius:20px;padding:4px 11px;text-align:center;cursor:pointer;flex-shrink:0}
.hdr-plan-name{color:#93C5FD;font-size:10px;font-weight:600}
.hdr-plan-sub{color:#64748B;font-size:8px}
.hdr-tagline{background:rgba(255,215,0,.07);border:1px solid rgba(255,215,0,.15);border-radius:8px;padding:6px 10px;text-align:center;margin-bottom:7px}
.hdr-tagline p{color:rgba(255,255,255,.9);font-size:11px;line-height:1.4;margin:0 0 2px}
.hdr-tagline b{color:#FFD700;font-size:10px;display:block}
.hdr-nav{display:flex;gap:5px;flex-wrap:wrap;border-top:1px solid rgba(255,255,255,.08);padding-top:8px}
.nav-btn{padding:4px 10px;border-radius:20px;border:1px solid rgba(212,160,23,.4);background:rgba(212,160,23,.08);color:#D4A017;font-size:9px;font-weight:600;cursor:pointer;transition:all .12s}
.nav-btn:hover,.nav-btn.active{background:rgba(212,160,23,.2);border-color:#D4A017}

/* Main card */
.main-card{background:#fff;border:1.5px solid #BFDBFE;border-radius:14px;padding:13px;margin-bottom:10px;box-shadow:0 2px 10px rgba(37,99,235,.06)}

/* Input row */
.inp-row{display:flex;gap:7px;margin-bottom:8px;flex-wrap:wrap;align-items:flex-start;position:relative;z-index:200}
.subj-btn{padding:8px 11px;border-radius:9px;border:1.5px solid #BFDBFE;background:#EFF6FF;color:#1E3A5F;font-size:11px;font-weight:700;display:flex;align-items:center;gap:6px;min-width:170px;cursor:pointer;flex-shrink:0}
.subj-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.topic-inp{flex:1;min-width:160px;padding:8px 12px;border-radius:9px;border:1.5px solid #BFDBFE;background:#F8FAFF;color:#1E3A5F;font-size:12px;transition:border-color .15s}
.topic-inp:focus{border-color:#3B82F6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}

/* Controls row */
.ctrl-row{display:flex;gap:5px;margin-bottom:9px;flex-wrap:wrap;align-items:center}
.toggle-wrap{display:flex;background:#EFF6FF;border-radius:20px;padding:2px;gap:0}
.toggle-btn{padding:4px 11px;border-radius:20px;font-size:10px;font-weight:600;cursor:pointer;transition:all .12s;color:#3B82F6}
.toggle-btn.active{background:#3B82F6;color:#fff}
.sel{padding:4px 9px;border-radius:20px;border:1.5px solid #BFDBFE;background:#EFF6FF;color:#1E40AF;font-size:10px;font-weight:700}

/* Group labels */
.grp-lbl{display:flex;align-items:center;gap:8px;margin:8px 0 6px}
.grp-pill{padding:3px 10px;border-radius:20px;font-size:9px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
.grp-line{flex:1;height:1px;background:linear-gradient(90deg,#DBEAFE,transparent)}

/* Mode grid */
.mode-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:8px}
.mode-card{border-radius:10px;padding:9px 6px;text-align:center;border:1.5px solid #DBEAFE;background:#F8FAFF;cursor:pointer;transition:all .18s;position:relative}
.mode-card:hover{border-color:#3B82F6;background:#EFF6FF;transform:translateY(-1px)}
.mode-card.active{border-color:#2563EB;background:#EFF6FF}
.mode-ic{font-size:17px;margin-bottom:3px;display:block}
.mode-nm{font-size:9px;font-weight:700;color:#1E3A5F;line-height:1.2;margin-bottom:1px}
.mode-card.active .mode-nm{color:#1E40AF}
.mode-ds{font-size:7.5px;color:#64748B;line-height:1.2}
.mode-dot{position:absolute;top:4px;right:4px;width:6px;height:6px;border-radius:50%;background:#2563EB}

/* Qt cards (3 col) */
.qt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:8px}
.qt-card{border-radius:10px;padding:8px 8px;border:1.5px solid;cursor:pointer;transition:all .15s}
.qt-card:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.08)}
.qt-top{display:flex;align-items:center;gap:5px;margin-bottom:2px}
.qt-ic{font-size:15px}
.qt-nm{font-size:10px;font-weight:700;line-height:1.2}
.qt-ds{font-size:7.5px;color:#64748B;line-height:1.2}

/* Smart cards (2 col) */
.smart-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:9px}
.smart-card{border-radius:11px;padding:11px 12px;cursor:pointer;transition:all .15s;overflow:hidden;border:1.5px solid}
.smart-card:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.15)}
.smart-badge{font-size:7px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;opacity:.7}
.smart-top{display:flex;align-items:center;gap:8px}
.smart-ic{font-size:20px}
.smart-nm{font-size:11px;font-weight:700;color:#fff;line-height:1.2}
.smart-tl{font-size:8.5px;color:rgba(255,255,255,.7);margin-top:2px}

/* Tool buttons strip */
.tools-strip{background:#F8FAFF;border:1px solid #DBEAFE;border-radius:10px;padding:8px 10px;margin-bottom:9px}
.tools-lbl{font-size:8px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px}
.tools-row{display:flex;gap:4px;flex-wrap:wrap}
.tool-btn{padding:5px 10px;border-radius:20px;font-size:9.5px;font-weight:600;border:1px solid;cursor:pointer;display:inline-flex;align-items:center;gap:3px;transition:all .12s;white-space:nowrap}
.tool-btn:hover{opacity:.85;transform:translateY(-1px)}

/* Voice row */
.voice-row{display:flex;gap:7px;margin-bottom:9px;flex-wrap:wrap}
.v-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:10px;font-weight:600;cursor:pointer;border:1.5px solid;transition:all .12s}

/* Generate button */
.gen-btn{width:100%;padding:13px;border-radius:10px;background:linear-gradient(135deg,#3B82F6,#7C3AED);color:#fff;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.01em;transition:all .2s;box-shadow:0 4px 18px rgba(59,130,246,.35)}
.gen-btn:hover{box-shadow:0 6px 24px rgba(59,130,246,.5);transform:translateY(-1px)}
.gen-btn:disabled{background:#DBEAFE;color:#93C5FD;cursor:not-allowed;box-shadow:none;transform:none}

/* Quick topic chips */
.chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px}
.chip{padding:3px 10px;border-radius:20px;border:1px solid #BFDBFE;background:#EFF6FF;font-size:10px;color:#3B82F6;font-weight:500;cursor:pointer;transition:all .12s;white-space:nowrap}
.chip:hover{background:#DBEAFE;border-color:#3B82F6}

/* Dropdown */
.drop{position:absolute;top:calc(100% + 5px);left:0;background:#fff;border:2px solid #3B82F6;border-radius:11px;padding:9px;width:min(310px,90vw);max-height:370px;overflow-y:auto;box-shadow:0 12px 36px rgba(37,99,235,.2);z-index:9999;animation:fadeUp .15s ease}
.drop-grp{margin-bottom:9px}
.drop-grp-lbl{margin:0 0 5px;font-size:9px;font-weight:800;text-transform:uppercase;padding-bottom:3px;border-bottom-width:2px;border-bottom-style:solid}
.drop-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px}
.drop-item{padding:4px 6px;border-radius:6px;border:1.5px solid #DBEAFE;background:#F8FAFF;font-size:9px;color:#1E3A5F;text-align:left;display:flex;align-items:center;gap:4px;cursor:pointer;transition:all .1s}
.drop-item:hover{background:#EFF6FF;border-color:#3B82F6}
.drop-item.active{background:rgba(37,99,235,.08);border-color:#3B82F6;color:#1E40AF;font-weight:700}
.drop-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

/* Tips dropdown */
.tips-drop{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid #3B82F6;border-radius:8px;overflow:hidden;z-index:8000;box-shadow:0 8px 22px rgba(37,99,235,.12);margin-top:3px}
.tip-item{width:100%;padding:7px 12px;text-align:left;border:none;border-bottom:1px solid #EFF6FF;background:#fff;font-size:11px;color:#1E3A5F;cursor:pointer}
.tip-item:hover{background:#EFF6FF}

/* Modals */
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.75);z-index:9000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px);animation:fadeUp .2s ease}
.modal{background:#fff;border-radius:16px;width:min(520px,100%);max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(0,0,0,.35)}
.modal-hdr{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.modal-body{padding:16px 18px;overflow-y:auto;flex:1}
.modal-close{background:rgba(0,0,0,.1);border:none;width:27px;height:27px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff}

/* Side panels */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:800}
.panel{position:fixed;top:0;width:min(320px,95vw);height:100vh;background:#fff;z-index:900;display:flex;flex-direction:column;box-shadow:0 0 40px rgba(0,0,0,.25);overflow:hidden}
.panel-r{right:0;animation:pSlideR .25s ease}
.panel-l{left:0;animation:pSlideL .25s ease}
@keyframes pSlideR{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes pSlideL{from{transform:translateX(-100%)}to{transform:translateX(0)}}
.panel-hdr{padding:12px 15px;background:linear-gradient(135deg,#1E3A5F,#3B82F6);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.panel-hdr p{margin:0;font-weight:800;font-size:14px;color:#fff}
.panel-body{padding:11px;overflow-y:auto;flex:1}

/* Pill tags */
.pill{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:600;background:#EFF6FF;color:#3B82F6;border:1px solid #BFDBFE}

/* Cards */
.card{border:1.5px solid #BFDBFE;border-radius:10px;padding:12px 13px;margin-bottom:9px;background:#F0F9FF}
.card-w{background:#fff}

/* Sections */
.sec{border:1.5px solid #BFDBFE;border-radius:9px;overflow:hidden;margin-bottom:8px}
.sec-hdr{padding:9px 13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:#EFF6FF}
.sec-hdr p{margin:0;font-weight:700;font-size:12px;color:#1E40AF}
.sec-body{padding:10px 13px;background:#fff}

/* Quiz */
.qopt{cursor:pointer;padding:7px 10px;border-radius:7px;font-size:12px;color:#1E3A5F;border:1.5px solid #DBEAFE;background:#FAFBFF;display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;transition:all .1s}
.qopt:hover{border-color:#3B82F6;background:#EFF6FF}
.qopt.sel{border-color:#3B82F6;background:#EFF6FF}
.qopt.right{border-color:#059669!important;background:#F0FDF4!important;color:#166534!important}
.qopt.wrong{border-color:#DC2626!important;background:#FEF2F2!important;color:#991B1B!important}

/* Flip cards */
.fc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.fc{cursor:pointer;min-height:125px;border:2px solid #BFDBFE;border-radius:10px;padding:10px;background:#fff;display:flex;flex-direction:column;transition:all .2s}
.fc:hover{border-color:#3B82F6;transform:translateY(-1px)}
.fc.flipped{background:#EFF6FF;border-color:#3B82F6}
.fc.known{border-color:#059669!important;background:#F0FDF4!important}

/* Result */
.result-wrap{border:1.5px solid #BFDBFE;border-radius:14px;padding:14px;background:#fff;animation:fadeUp .3s ease;margin-bottom:10px}

/* Loading */
.spinner{width:28px;height:28px;border:3px solid #DBEAFE;border-top-color:#3B82F6;border-radius:50%;animation:spin 1s linear infinite}
.pbar{height:4px;background:#DBEAFE;border-radius:4px;overflow:hidden}
.pbar-fill{height:100%;background:linear-gradient(90deg,#3B82F6,#7C3AED);border-radius:4px;transition:width .3s}

/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#F1F5F9}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px}

/* Tool section wrappers */
.tool-sec{border-radius:12px;overflow:hidden;margin-bottom:10px;animation:fadeUp .3s ease}
.tool-sec-hdr{padding:11px 15px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.tool-sec-body{padding:13px 15px;background:#fff}
.close-btn{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:14px;width:27px;height:27px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* Chat bubbles */
.chat-wrap{max-height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:7px;padding:4px 0;margin-bottom:10px}
.bubble{max-width:88%;padding:9px 13px;border-radius:12px;font-size:11px;line-height:1.65;white-space:pre-wrap}
.bubble-ai{background:linear-gradient(135deg,#1E3A5F,#0F172A);color:#fff;border-radius:12px 12px 12px 3px;align-self:flex-start}
.bubble-user{background:linear-gradient(135deg,#3B82F6,#1E40AF);color:#fff;border-radius:12px 12px 3px 12px;align-self:flex-end}

/* Dark mode */
body.dark{background:#0F172A;color:#E2E8F0}
body.dark .main-card{background:#1E293B;border-color:#1E3A5F}
body.dark .topic-inp{background:#1E293B;border-color:#1E3A5F;color:#E2E8F0}
body.dark .mode-card{background:#1E293B;border-color:#1E3A5F}
body.dark .mode-card.active{background:rgba(37,99,235,.15);border-color:#3B82F6}
body.dark .qopt{background:#1E293B;border-color:#1E3A5F;color:#E2E8F0}
body.dark .card{background:#1E293B;border-color:#1E3A5F}
body.dark .sec-hdr{background:#1E293B}
body.dark .sec-body{background:#0F172A}
body.dark .tools-strip{background:#1E293B;border-color:#1E3A5F}
body.dark .result-wrap{background:#1E293B;border-color:#1E3A5F}
body.dark .fc{background:#1E293B;border-color:#1E3A5F}
body.dark .modal{background:#1E293B}

/* Responsive */
@media(max-width:600px){
  .mode-grid{grid-template-columns:repeat(3,1fr)!important}
  .qt-grid{grid-template-columns:repeat(2,1fr)!important}
  .hdr-owners{display:none}
}
@media(max-width:380px){
  .mode-grid{grid-template-columns:repeat(2,1fr)!important}
}

/* upgrade banner */
.upg-bar{margin-bottom:9px;padding:8px 13px;background:linear-gradient(135deg,#FFFBEB,#FEF3C7);border:2px solid #D97706;border-radius:9px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}

/* Offline */
#offbanner{position:fixed;top:0;left:0;right:0;z-index:99999;background:#DC2626;color:#fff;text-align:center;padding:8px 16px;font-size:12px;font-weight:700}
</style>

<body>
<div id="toasts"></div>
<div id="app"></div>
<script>
'use strict';
// ─── Storage ──────────────────────────────────────────────
const LS={
  g:(k,d=null)=>{try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d}catch(e){return d}},
  s:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
};
// ─── API (Anthropic with key) ────────────────────────────
const API={
  getKey:function(){return LS.g('sm_api_key','')},
  setKey:function(k){LS.s('sm_api_key',k)},
  hasKey:function(){return !!(LS.g('sm_api_key',''))},
  call:async function(body){
    var key=this.getKey();
    if(!key){
      APP.showApiSetup=true;render();
      throw new Error('API key not set. Please add your Anthropic API key.');
    }
    var r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({...body,model:'claude-sonnet-4-20250514',max_tokens:body.max_tokens||2000})
    });
    var d=await r.json();
    if(!r.ok||d.error)throw Object.assign(new Error(d.error?.message||d.error||'API Error '+r.status),{status:r.status});
    return d;
  }
};
// ─── Helpers ──────────────────────────────────────────────
function fixJSON(raw){
  let s=raw.trim().replace(/^```(?:json)?\s*/i,'').replace(/```\s*$/,'').trim();
  const i=s.indexOf('{'),j=s.lastIndexOf('}');
  if(i>-1&&j>i)s=s.slice(i,j+1);
  try{return JSON.parse(s)}catch(e1){
    s=s.replace(/,\s*([}\]])/g,'$1').replace(/([{,]\s*)(\w+)\s*:/g,'$1"$2":').replace(/:\s*'([^']*)'/g,':"$1"');
    try{return JSON.parse(s)}catch(e2){return {title:"Result",overview:raw.slice(0,400),sections:[],keyFacts:[]}}
  }
}
function toast(msg,type,ms){
  type=type||'success';ms=ms||3200;
  const b=document.getElementById('toasts');if(!b)return;
  const t=document.createElement('div');t.className='toast';
  const cols={success:'#059669',error:'#DC2626',info:'#3B82F6',warning:'#D97706'};
  t.style.borderLeftColor=cols[type]||cols.info;
  t.textContent=msg;b.appendChild(t);setTimeout(function(){t.remove()},ms);
}
function apiErr(e){
  const m=e?.message||'';const st=e?.status;
  if(st===401)return '⚠️ API auth error.';
  if(st===429||m.includes('429'))return '⏱️ Rate limit — wait 30s and retry.';
  if(m.includes('fetch')||m.includes('network')||m.includes('abort'))return '🌐 Network error — check internet.';
  return m||'Unknown error — please retry.';
}
const Sec={
  clean:function(s){return String(s||'').replace(/<[^>]*>/g,'').replace(/javascript:/gi,'').slice(0,4000).trim()},
  safe:function(s){return ![/<script/i,/javascript:/i,/union\s+select/i].some(function(p){return p.test(s)})},
  _h:{},
  rate:function(k,max){max=max||30;const n=Date.now();this._h[k]=(this._h[k]||[]).filter(function(t){return n-t<60000});this._h[k].push(n);return this._h[k].length<=max}
};
function speak(text,lang){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text.slice(0,200));
  u.lang=lang||'en-IN';window.speechSynthesis.speak(u);
}

// ─── Plans ────────────────────────────────────────────────
const PLANS={
  free:{id:'free',name:'Free',limit:5,features:['5 AI requests/day','Notes, Quiz, Flashcards','3 subjects']},
  student:{id:'student',name:'Student Pro',price:199,limit:9999,features:['Unlimited AI','All 12 modes','All 40+ subjects','AI Tutor','File Scanner']},
  exam:{id:'exam',name:'Exam Prep',price:499,limit:9999,features:['Everything in Pro','Exam Simulators','PYQ Papers','Analytics']}
};
const PR={free:0,student:1,exam:2};
function canUse(p,m){return (PR[p]||0)>=(PR[m]||0)}

// ─── Referral Codes ───────────────────────────────────────
const CODES={

function el(tag,props,kids){
  props=props||{};kids=kids||[];
  const e=document.createElement(tag);
  Object.keys(props).forEach(function(k){
    const v=props[k];
    if(k==='style'&&typeof v==='object'){Object.keys(v).forEach(function(sk){e.style[sk]=v[sk]})}
    else if(k==='html'){e.innerHTML=v}
    else if(k==='class'){e.className=v}
    else if(k.startsWith('on')){e.addEventListener(k.slice(2).toLowerCase(),v)}
    else if(v!=null){e.setAttribute(k,v)}
  });
  [].concat(kids||[]).forEach(function(c){
    if(c==null)return;
    if(c instanceof Element)e.appendChild(c);
    else e.appendChild(document.createTextNode(String(c)));
  });
  return e;
}

function saveProgress(subId,pct){
  const prog=LS.g('progress',{subjects:{},quizzes:[],streak:0,lastStudy:null});
  const today=new Date().toDateString();
  const yesterday=new Date(Date.now()-86400000).toDateString();
  const streak=prog.lastStudy===today?prog.streak:(prog.lastStudy===yesterday?prog.streak+1:1);
  const subjects=Object.assign({},prog.subjects);
  const sk=(ALLSUBJ.find(function(s){return s.id===subId})||{l:subId}).l;
  if(!subjects[sk])subjects[sk]={sessions:0,avgScore:0};
  subjects[sk].sessions=(subjects[sk].sessions||0)+1;
  if(pct!=null)subjects[sk].avgScore=Math.round(((subjects[sk].avgScore||0)+pct)/2);
  const quizzes=pct!=null?[...prog.quizzes,{topic:APP.topic,subject:sk,pct:pct,date:Date.now()}].slice(-50):prog.quizzes;
  LS.s('progress',{subjects:subjects,quizzes:quizzes,streak:streak,lastStudy:today});
}

    MODES.filter(function(m){return m.id!==APP.result.mode&&m.id!=='allpack'}).slice(0,8).forEach(function(m){
      var locked=!canUse(APP.plan,m.min);
      var b=btn({style:{padding:'3px 9px',borderRadius:'20px',border:'1.5px solid '+( m.c||'#3B82F6')+'33',background:(m.c||'#3B82F6')+'10',fontSize:'9px',fontWeight:'700',color:locked?'#94A3B8':(m.c||'#3B82F6'),cursor:locked?'default':'pointer',opacity:locked?.6:1},onclick:function(){if(locked){APP.upgradeFor={reason:m.l+' requires Student Pro.',plan:'student'};render();return}APP.mode=m.id;APP.topic=APP.result.topic||APP.topic;generate()}},m.ic+' '+m.l+(locked?' 🔒':''));
      qts.appendChild(b);
    });
    ri.appendChild(qts);

    var ra=div({style:{display:'flex',gap:'5px',flexWrap:'wrap'}});

    if(window.speechSynthesis){var ov2=APP.result.data&&(APP.result.data.overview||APP.result.data.oneLiner||'');if(ov2)ra.appendChild(btn({style:{padding:'4px 10px',borderRadius:'20px',border:'1px solid #BFDBFE',background:'#EFF6FF',color:'#3B82F6',fontSize:'10px',fontWeight:'700',cursor:'pointer'},onclick:function(){speak(ov2,'en-IN')}},'🔊'))}
    ra.appendChild(btn({style:{padding:'4px 10px',borderRadius:'20px',border:'1px solid #FECACA',background:'#FEF2F2',color:'#DC2626',fontSize:'10px',fontWeight:'700',cursor:'pointer'},onclick:function(){APP.result=null;render()}},'✕ Clear'));
    rh.appendChild(ri);rh.appendChild(ra);rc.appendChild(rh);

    // Render result content
    var mode=APP.result.mode;var data=APP.result.data;
    if(mode==='notes')rc.appendChild(renderNotes(data));
    else if(mode==='flashcards')rc.appendChild(renderCards(data));
    else if(mode==='quiz')rc.appendChild(renderQuiz(data));
    else if(mode==='summary')rc.appendChild(renderSummary(data));
    else if(mode==='mindmap')rc.appendChild(renderMindmap(data));
    else if(mode==='essay')rc.appendChild(renderEssay(data));

    else if(mode==='bits')rc.appendChild(renderBits(data));
    else if(mode==='drawdiagram')rc.appendChild(renderDiagram(data));
    else if(mode==='predict')rc.appendChild(renderPredict(data));
    else if(mode==='allpack')rc.appendChild(renderAllPack(data));
    else rc.appendChild(renderNotes(data));

    if(APP.showTutor)rc.appendChild(renderTutorPanel());
    root.appendChild(rc);
  }

  // Referral modal removed — codes shared privately

  // ── FOOTER ────────────────────────────────────────────────
  var footer=div({style:{textAlign:'center',padding:'16px 0 6px',borderTop:'1px solid #BFDBFE',marginTop:'10px'}});
  footer.innerHTML='<p style="margin:0 0 3px;font-size:10px;color:#94A3B8">StudyMaster AI — Muppuri Chamber</p><p style="margin:0 0 2px;font-size:9px;color:#94A3B8;opacity:.7">Owner: Muppuri Venkata Suresh · Co-Owner: Palla Venkata Naga Adithya</p><p style="margin:0;font-size:8px;color:#CBD5E1;opacity:.5">UPSC · NEET · JEE · APPSC · TSPSC · SSC · 40+ Subjects · 50+ Languages · Powered by Claude AI</p>';
  root.appendChild(footer);

  // Keyboard shortcuts
  document.onkeydown=function(e){
    if((e.ctrlKey||e.metaKey)&&e.key==='Enter')generate();
    if(e.key==='Escape'){APP.showSubjDrop=false;render()}
  };

  }catch(err){

  }
}

window.addEventListener('appinstalled',function(){localStorage.setItem('pwa_installed','1');var b=document.getElementById('pwa-banner');if(b)b.remove();toast('🎉 StudyMaster AI installed!','success',5000)});

if('serviceWorker' in navigator && location.protocol !== 'file:'){
  try{
